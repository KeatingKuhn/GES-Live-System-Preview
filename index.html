    // Center unit in house zone before condenser, shift left after
    const UNIT_X=hasCond?Math.round((HOUSE_W-UNIT_W)/2-20):Math.round((VW-UNIT_W)/2);

    const DUCT_TOP=16;
    const DECK_Y=200;

    // Plenum
    const PLEN_W=UNIT_W;
    const PLEN_ABOVE=hasPlenum?100:0;
    const PLEN_BELOW=hasPlenum?44:0;
    const PLEN_TOTAL=PLEN_ABOVE+PLEN_BELOW;
    const PLEN_TOP=DECK_Y-PLEN_ABOVE;
    const PLEN_BOT=DECK_Y+PLEN_BELOW;

    const UNIT_TOP=PLEN_BOT;
    const ACOIL_H=hasFurnace?COIL_H:AH_H;
    const ACOIL_Y=UNIT_TOP;
    const FURN_Y=ACOIL_Y+ACOIL_H+4;
    const APR_H=hasAprilaire?24:0;
    const APR_Y=hasFurnace?FURN_Y+FURN_H:ACOIL_Y+ACOIL_H;
    const CHASE_H=64;  // taller — was 52
    const CHASE_Y=APR_Y+APR_H+2;
    const CLOSET_PAD=Math.round(UNIT_W*0.28); // closet wall margin scales with unit
    // Lineset exits RIGHT face of A-coil at its vertical midpoint
    const LS_Y1=ACOIL_Y+Math.round(ACOIL_H*0.30);
    const LS_Y2=ACOIL_Y+Math.round(ACOIL_H*0.48);

    // Condenser — same real-world proportions, scaled to fill ~70% of outside zone
    const PX=3.2;
    const CU_SIZES={
      fedmin:   {w:Math.round(24*PX), h:Math.round(30*PX)},
      mid_ge15: {w:Math.round(36*PX), h:Math.round(22*PX)},
      high_ge18:{w:Math.round(36*PX), h:Math.round(50*PX)},
      premium:  {w:Math.round(36*PX), h:Math.round(50*PX)},
    };
    const CU=CU_SIZES[a.cond_tier]||CU_SIZES.fedmin;
    // Scale condenser to fill outside zone — ensure it fits
    const ZONE_COND_W=Math.round(OUTSIDE_ZONE_W*0.62);
    const C_SCALE=hasCond&&OUTSIDE_ZONE_W>0?(ZONE_COND_W/CU.w):1;
    const COND_W=Math.round(CU.w*C_SCALE);
    const COND_H=Math.round(CU.h*C_SCALE);
    const EXT_WALL_X=HOUSE_W;
    const WALL_THICK=18;
    const DISC_ZONE=52;
    const COND_X=EXT_WALL_X+WALL_THICK+DISC_ZONE+8;
    // Condenser sits at ground level — bottom near bottom of canvas
    const GROUND_Y=VH-40;
    const COND_Y=GROUND_Y-COND_H;
    // Lineset exits the RIGHT face of the A-coil at its midpoint — NOT the plenum
    // ACOIL_Y is defined below, so we compute after unit stack constants
    // (will be: ACOIL_Y + ACOIL_H * 0.35 and 0.55)

    return(
      <div style={{position:'relative',width:'100%'}}>
        {hasCoil&&<ToggleUI style={{position:'absolute',top:8,right:8,zIndex:10}}/>}
        <svg viewBox={`0 0 ${VW} ${VH}`} className="canvas-svg">
          <Defs/>
          <rect x="0" y="0" width={VW} height={VH} fill="#040404"/>
          {/* Outside zone */}
          {hasCond&&<rect x={HOUSE_W} y="0" width={VW-HOUSE_W} height={VH} fill="#030305"/>}
          {/* Full attic space above deck */}
          <rect x="0" y="0" width={hasCond?HOUSE_W:VW} height={DECK_Y} fill="#060608"/>
          {/* Closet below deck */}
          <rect x={UNIT_X-CLOSET_PAD} y={DECK_Y} width={UNIT_W+CLOSET_PAD*2} height={VH-DECK_Y}
            fill="rgba(9,9,16,.9)" stroke={W+'.05)'} strokeWidth="1.4"/>
          <rect x={UNIT_X-CLOSET_PAD} y={DECK_Y} width="5" height={VH-DECK_Y} fill="#0d0d0d"/>
          <rect x={UNIT_X+UNIT_W+CLOSET_PAD} y={DECK_Y} width="5" height={VH-DECK_Y} fill="#0d0d0d"/>
          <text x={UNIT_X+UNIT_W/2} y={DECK_Y+14} textAnchor="middle"
            fill={W+'.1)'} fontSize="8.5" fontFamily="monospace" letterSpacing="1.5">UTILITY CLOSET</text>

          {/* ── LOW-PITCH ROOF — spans attic width ── */}
          {(()=>{
            const rW=hasCond?HOUSE_W:VW-8;
            const rRise=Math.round(Math.min(rW/2*(3/12),60));
            const rEave=rRise+12;
            const rRidge=8, rMid=rW/2;
            return <>
              <line x1="0" y1={rEave} x2={rMid} y2={rRidge} stroke="rgba(130,124,106,.36)" strokeWidth="2.8"/>
              <line x1={rMid} y1={rRidge} x2={rW} y2={rEave} stroke="rgba(130,124,106,.36)" strokeWidth="2.8"/>
              <polygon points={`0,${rEave} ${rMid},${rRidge} ${rW},${rEave}`} fill="rgba(10,10,16,.55)"/>
              <rect x={rMid-5} y={rRidge-2} width="10" height="7" rx="2" fill="rgba(160,155,135,.17)"/>
              {/* Interior rafters */}
              {[rW*0.15,rW*0.32].map((rx,i)=>(
                <line key={'lr'+i} x1={rx} y1={DECK_Y} x2={rMid} y2={rRidge} stroke="rgba(88,68,32,.1)" strokeWidth="1.5"/>
              ))}
              {[rW*0.68,rW*0.85].map((rx,i)=>(
                <line key={'rr'+i} x1={rx} y1={DECK_Y} x2={rMid} y2={rRidge} stroke="rgba(88,68,32,.1)" strokeWidth="1.5"/>
              ))}
            </>;
          })()}

          {/* Insulation — spray on ROOF UNDERSIDE, fiberglass on ATTIC FLOOR, only when selected */}
          {a.insulation&&(isSpray
            ?<>
              {/* Spray foam follows roof pitch on underside */}
              {(()=>{
                const rW=hasCond?HOUSE_W:VW-8;
                const rRise=Math.round(Math.min(rW/2*(3/12),60));
                const rEave=rRise+12, rRidge=8, rMid=rW/2;
                return <>
                  {Array.from({length:14},(_,i)=>{
                    const t=i/13, sx=t*rMid, sy=rEave-(rEave-rRidge)*t;
                    const ang=-Math.atan2(rEave-rRidge,rMid)*180/Math.PI;
                    return <ellipse key={'sfl'+i} cx={sx+8} cy={sy+9} rx={18} ry={10}
                      fill="rgba(234,238,246,.14)" stroke="rgba(234,238,246,.2)" strokeWidth=".5"
                      transform={`rotate(${ang},${sx+8},${sy+9})`}/>;
                  })}
                  {Array.from({length:14},(_,i)=>{
                    const t=i/13, sx=rMid+t*(rW-rMid), sy=rRidge+(rEave-rRidge)*t;
                    const ang=Math.atan2(rEave-rRidge,rW-rMid)*180/Math.PI;
                    return <ellipse key={'sfr'+i} cx={sx} cy={sy+8} rx={18} ry={10}
                      fill="rgba(234,238,246,.14)" stroke="rgba(234,238,246,.2)" strokeWidth=".5"
                      transform={`rotate(${ang},${sx},${sy+8})`}/>;
                  })}
                  <text x="22" y={DECK_Y-24} fill="rgba(232,236,246,.3)" fontSize="5.5" fontFamily="monospace">SPRAY FOAM</text>
                </>;
              })()}
            </>
            :<>
              {Array.from({length:Math.floor((hasCond?HOUSE_W:VW-8)/17)},(_,i)=>(
                <ellipse key={i} cx={8+i*17} cy={DECK_Y-8} rx={11} ry={7}
                  fill="rgba(255,182,193,.15)" stroke="rgba(255,182,193,.19)" strokeWidth=".4"/>
              ))}
              <text x="22" y={DECK_Y-22} fill="rgba(255,182,193,.3)" fontSize="5.5" fontFamily="monospace">FIBERGLASS INSULATION</text>
            </>
          )}

          {/* Attic deck line */}
          <rect x="0" y={DECK_Y} width={hasCond?HOUSE_W:VW-8} height="5"
            fill="#141416" stroke="rgba(186,182,166,.08)" strokeWidth="0.4"/>
          {/* Ceiling joists */}
          {Array.from({length:Math.floor((hasCond?HOUSE_W:VW-8)/68)},(_,i)=>(
            <rect key={i} x={38+i*68} y={DECK_Y-2} width="10" height="7" rx="1"
              fill="rgba(90,68,32,.2)" stroke="rgba(108,82,36,.12)" strokeWidth="0.4"/>
          ))}
          <text x="22" y={DECK_Y+20} fill={W+'.08)'} fontSize="5.5" fontFamily="monospace" letterSpacing="0.8">ATTIC</text>

          {/* Supply duct branches off the SIDES of the plenum in the attic */}
          {hasCoil&&hasPlenum&&a.plenum!=='none'&&<g>
            {[
              // Left branch: exits left face of plenum, runs left then up
              {sx:UNIT_X, sy:PLEN_TOP+PLEN_ABOVE*0.35, ex:UNIT_X-80, ey:PLEN_TOP+PLEN_ABOVE*0.12, dir:'left'},
              // Right branch: exits right face of plenum, runs right then up
              {sx:UNIT_X+PLEN_W, sy:PLEN_TOP+PLEN_ABOVE*0.35, ex:UNIT_X+PLEN_W+80, ey:PLEN_TOP+PLEN_ABOVE*0.12, dir:'right'},
            ].map((b,i)=>{
              const DW=13;
              const DC=G+'.32)';
              const DS='rgba(0,0,0,.4)';
              // L-shaped duct: horizontal run from plenum face, then vertical up to boot
              const horizLen=Math.abs(b.ex-b.sx);
              const vertStart=b.sy;
              const vertEnd=b.ey;
              const hx1=b.sx, hy=b.sy;
              const hx2=b.ex;
              return <g key={i}>
                {/* Horizontal run */}
                <rect x={Math.min(hx1,hx2)} y={hy-DW/2} width={horizLen} height={DW} rx="0"
                  fill={DC} stroke={DS} strokeWidth="0.8"/>
                {/* Vertical drop to top */}
                <rect x={hx2-(DW/2)} y={vertEnd} width={DW} height={vertStart-vertEnd} rx="0"
                  fill={DC} stroke={DS} strokeWidth="0.8"/>
                {/* Elbow corner fill */}
                <rect x={Math.min(hx1,hx2)} y={hy-DW/2} width={DW} height={DW} rx="0"
                  fill={DC} stroke="none"/>
                {/* Boot cap at top */}
                <rect x={hx2-DW/2-4} y={vertEnd-5} width={DW+8} height={DW+5} rx="2"
                  fill="#0a0a0a" stroke={DC} strokeWidth="1.2"/>
                <text x={hx2} y={vertEnd-8} textAnchor="middle"
                  fill={G+'.38)'} fontSize="6" fontFamily="monospace">SUPPLY</text>
              </g>;
            })}
          </g>}

          {/* ── SUPPLY PLENUM — crosses deck, extends into attic ── */}
          {hasPlenum&&hasCoil&&<g className="snap" key="spl">
            {(()=>{
              const isExisting=a.plenum==='none';
              const isMetal=a.plenum==='metal';
              const pFill=isExisting?"rgba(38,38,52,.6)":isMetal?"#1a1c24":"#141108";
              const pStroke=isExisting?(G+'.22)'):(G+(isMetal?'.74)':'.5)'));
              return <>
                <rect x={UNIT_X} y={PLEN_TOP} width={PLEN_W} height={PLEN_TOTAL} rx="3"
                  fill={pFill} stroke={pStroke} strokeWidth={isExisting?1:isMetal?1.7:1.4}
                  strokeDasharray={isExisting?"6 3":undefined} opacity={isExisting?0.7:1}/>
                {!isExisting&&isMetal&&Array.from({length:Math.floor(PLEN_TOTAL/8)},(_,i)=>(
                  <line key={i} x1={UNIT_X+2} y1={PLEN_TOP+4+i*8} x2={UNIT_X+PLEN_W-2} y2={PLEN_TOP+4+i*8}
                    stroke={W+'.04)'} strokeWidth="0.3"/>
                ))}
                {/* Deck line crossing through plenum */}
                <line x1={UNIT_X-8} y1={DECK_Y} x2={UNIT_X+PLEN_W+8} y2={DECK_Y}
                  stroke={G+'.30)'} strokeWidth="1" strokeDasharray="4 3"/>
                {/* Plenum label */}
                <text x={UNIT_X+PLEN_W/2} y={PLEN_TOP+PLEN_TOTAL*0.58+3} textAnchor="middle"
                  fill={isExisting?(G+'.3)'):(G+'.5)')} fontSize="5.8" fontFamily="monospace">
                  {isExisting?'EXISTING PLENUM':isMetal?'METAL PLENUM':'DUCTBOARD PLENUM'}
                </text>
                {/* ATTIC zone label inside plenum */}
                <text x={UNIT_X+PLEN_W/2} y={PLEN_TOP+PLEN_ABOVE*0.38+4} textAnchor="middle"
                  fill={G+'.26)'} fontSize="5" fontFamily="monospace">↑ ATTIC SPACE</text>
                {/* Supply airflow arrows INSIDE the plenum — two upward flow arrows */}
                {!isExisting&&[UNIT_X+PLEN_W*0.28, UNIT_X+PLEN_W*0.68].map((ax,i)=>(
                  <g key={i}>
                    <path d={`M${ax} ${PLEN_TOP+PLEN_ABOVE*0.85} L${ax} ${PLEN_TOP+PLEN_ABOVE*0.18}`}
                      fill="none" stroke={G+'.25)'} strokeWidth="8" strokeLinecap="round" opacity="0.3"/>
                    <path d={`M${ax} ${PLEN_TOP+PLEN_ABOVE*0.85} L${ax} ${PLEN_TOP+PLEN_ABOVE*0.18}`}
                      fill="none" stroke={G+'.35)'} strokeWidth="1.2"
                      strokeDasharray="6 4" className="airflow" style={{strokeDashoffset:0}}
                      markerEnd="url(#arr)"/>
                    <text x={ax} y={PLEN_TOP+PLEN_ABOVE*0.92} textAnchor="middle"
                      fill={G+'.3)'} fontSize="4.5" fontFamily="monospace">SUPPLY</text>
                  </g>
                ))}
                {/* Ionizer — horizontal from right */}
                {hasIonizer&&!isExisting&&(()=>{
                  const rodLen=Math.round(PLEN_W*0.62);
                  const bulbX=UNIT_X+PLEN_W+12;
                  const rodY=PLEN_TOP+PLEN_TOTAL*0.82;  // near coil transition
                  const rodTip=UNIT_X+PLEN_W-rodLen;
                  return <g className="fadein">
                    <circle cx={bulbX} cy={rodY} r={16} fill="rgba(253,224,71,.07)" stroke="rgba(253,224,71,.18)" strokeWidth="0.5" filter="url(#glow-uv)"/>
                    <ellipse cx={bulbX} cy={rodY} rx={10} ry={12} fill="rgba(251,191,36,.18)" stroke="rgba(253,224,71,.75)" strokeWidth="1.5"/>
                    <ellipse cx={bulbX} cy={rodY} rx={6} ry={7.5} fill="rgba(253,224,71,.32)" stroke="none" className="glow-pulse"/>
                    <line x1={bulbX-3} y1={rodY-5} x2={bulbX+3} y2={rodY+5} stroke="rgba(253,224,71,.9)" strokeWidth="1.2" strokeLinecap="round"/>
                    <line x1={bulbX+3} y1={rodY-5} x2={bulbX-3} y2={rodY+5} stroke="rgba(253,224,71,.9)" strokeWidth="1.2" strokeLinecap="round"/>
                    <rect x={UNIT_X+PLEN_W-2} y={rodY-5} width={16} height={10} rx="2" fill="rgba(180,130,20,.45)" stroke="rgba(253,224,71,.5)" strokeWidth="0.8"/>
                    <line x1={UNIT_X+PLEN_W} y1={rodY} x2={rodTip} y2={rodY} stroke="rgba(253,224,71,.22)" strokeWidth={8} strokeLinecap="round" filter="url(#glow-uv)"/>
                    <line x1={UNIT_X+PLEN_W} y1={rodY} x2={rodTip} y2={rodY} stroke="rgba(253,224,71,.8)" strokeWidth={2.2} strokeLinecap="round"/>
                    <circle cx={rodTip} cy={rodY} r={3} fill="rgba(253,224,71,.9)" className="glow-pulse"/>
                    <text x={bulbX+18} y={rodY+4} textAnchor="start" fill="rgba(253,224,71,.45)" fontSize="5" fontFamily="monospace">IONIZER</text>
                  </g>;
                })()}
              </>;
            })()}
          </g>}

          {/* A-coil / AH */}
          {hasCoil&&<g className="snap" key={'ac-c'+a.cond_tier} style={{animationDelay:'.07s'}}>
            {(()=>{
              const active=evapActive;
              return <>
                <rect x={UNIT_X} y={ACOIL_Y} width={UNIT_W} height={ACOIL_H} rx="5"
                  fill={active?"#050c1c":"#090909"}
                  stroke={active?(evapC+'88'):(G+'.44)')} strokeWidth={active?1.8:1.5}/>
                {active&&<rect x={UNIT_X} y={ACOIL_Y} width={UNIT_W} height={ACOIL_H} rx="5"
                  fill={refReversed?O+'.03)':'rgba(35,137,224,.03)'} stroke="none"/>}
                <rect x={UNIT_X} y={ACOIL_Y} width={UNIT_W} height={9} rx="5"
                  fill={active?(refReversed?"url(#orange-g)":"url(#blue)"):"url(#gold)"} opacity=".65"/>
                {hasFurnace
                  ?<ACoilV x={UNIT_X+8} y={ACOIL_Y+14} w={UNIT_W-16} h={ACOIL_H-28} active={active}/>
                  :<>
                    <line x1={UNIT_X} y1={ACOIL_Y+ACOIL_H/2} x2={UNIT_X+UNIT_W} y2={ACOIL_Y+ACOIL_H/2}
                      stroke={G+'.18)'} strokeWidth="0.9" strokeDasharray="4 3"/>
                    <BlowerWheel cx={UNIT_X+UNIT_W/2} cy={ACOIL_Y+ACOIL_H*0.24}
                      r={Math.min(UNIT_W*0.32,ACOIL_H*0.18)}
                      spd={active?1.4:0.4} active={active||!heatMode}/>
                    <text x={UNIT_X+UNIT_W/2} y={ACOIL_Y+ACOIL_H*0.24+UNIT_W*0.32+12} textAnchor="middle"
                      fill={G+'.26)'} fontSize="5.5" fontFamily="monospace">BLOWER</text>
                    <ACoilV x={UNIT_X+8} y={ACOIL_Y+ACOIL_H*0.52+8} w={UNIT_W-16} h={ACOIL_H*0.46-16} active={active}/>
                    <text x={UNIT_X+UNIT_W/2} y={ACOIL_Y+ACOIL_H-7} textAnchor="middle"
                      fill={active?evapC:(G+'.24)')} fontSize="5.5" fontFamily="monospace">A-COIL</text>
                  </>
                }
                {hasCond&&<>
                  <path d={`M${UNIT_X+UNIT_W} ${ACOIL_Y+ACOIL_H*0.28} L${UNIT_X+UNIT_W+28} ${ACOIL_Y+ACOIL_H*0.28}`}
                    fill="none" stroke={active?evapC:'rgba(32,32,52,.5)'} strokeWidth="2.8" strokeLinecap="round" className="draw"/>
                  <path d={`M${UNIT_X+UNIT_W} ${ACOIL_Y+ACOIL_H*0.52} L${UNIT_X+UNIT_W+28} ${ACOIL_Y+ACOIL_H*0.52}`}
                    fill="none" stroke={active?evapC2:'rgba(32,32,52,.4)'} strokeWidth="2.8" strokeLinecap="round" className="draw" style={{animationDelay:'.08s'}}/>
                  {active&&<text x={UNIT_X+UNIT_W+14} y={ACOIL_Y+ACOIL_H*0.24}
                    textAnchor="middle" fill={evapC} fontSize="9" fontFamily="monospace">
                    {refReversed?'←':'→'}
                  </text>}
                </>}
                <text x={UNIT_X+UNIT_W/2} y={ACOIL_Y+ACOIL_H+12} textAnchor="middle"
                  fill={active?evapC:(G+'.35)')} fontSize="8" fontFamily="monospace">
                  {hasFurnace?"A-COIL":"AIR HANDLER"}
                </text>
              </>;
            })()}
          </g>}

          {/* Furnace — HX top | blower bottom */}
          {hasCoil&&hasFurnace&&<g className="snap" key={'fu-c'+a.stage}>
            <rect x={UNIT_X} y={FURN_Y} width={UNIT_W} height={FURN_H} rx="5"
              fill={furnaceActive?"#0e0606":"#090909"}
              stroke={furnaceActive?'rgba(249,115,22,.78)':(G+'.58)')} strokeWidth={furnaceActive?2.1:1.7}/>
            {furnaceActive&&<rect x={UNIT_X} y={FURN_Y} width={UNIT_W} height={FURN_H} rx="5"
              fill={O+'.04)'} stroke="none"/>}
            <rect x={UNIT_X} y={FURN_Y} width={UNIT_W} height={9} rx="5"
              fill={furnaceActive?"url(#orange-g)":"url(#gold)"} opacity=".72"/>
            <line x1={UNIT_X} y1={FURN_Y+FURN_H/2} x2={UNIT_X+UNIT_W} y2={FURN_Y+FURN_H/2}
              stroke={G+'.18)'} strokeWidth="0.9" strokeDasharray="4 3"/>
            {/* TOP: HX */}
            {Array.from({length:5},(_,i)=>(
              <path key={i}
                d={`M${UNIT_X+8} ${FURN_Y+12+i*((FURN_H/2-20)/5)} Q${UNIT_X+UNIT_W/2} ${FURN_Y+6+i*((FURN_H/2-20)/5)} ${UNIT_X+UNIT_W-8} ${FURN_Y+12+i*((FURN_H/2-20)/5)}`}
                fill="none" stroke={furnaceActive?'rgba(249,115,22,.56)':'rgba(108,44,8,.18)'}
                strokeWidth="2.6" strokeLinecap="round"/>
            ))}
            <rect x={UNIT_X+6} y={FURN_Y+FURN_H/2-13} width={UNIT_W-12} height={10} rx="2"
              fill={furnaceActive?O+'.07)':'rgba(5,5,13,.8)'}
              stroke={furnaceActive?'rgba(249,115,22,.42)':(G+'.14)')} strokeWidth="0.6"/>
            {furnaceActive&&Array.from({length:4},(_,i)=>(
              <ellipse key={i} cx={UNIT_X+14+i*((UNIT_W-14)/4)} cy={FURN_Y+FURN_H/2-13}
                rx={(UNIT_W-14)/10} ry={5}
                fill={O+'.55)'} className="glow-pulse" style={{animationDelay:i*0.12+'s'}}/>
            ))}
            <text x={UNIT_X+UNIT_W/2} y={FURN_Y+FURN_H/4+6} textAnchor="middle"
              fill={furnaceActive?'rgba(249,115,22,.44)':(G+'.24)')} fontSize="5.5" fontFamily="monospace">HEAT EXCH.</text>
            {/* BOTTOM: blower */}
            <BlowerWheel cx={UNIT_X+UNIT_W/2} cy={FURN_Y+FURN_H*0.75}
              r={Math.min(UNIT_W*0.32,FURN_H*0.18)}
              spd={furnaceActive?1.55:0.5} active={furnaceActive||!heatMode}/>
            <text x={UNIT_X+UNIT_W/2} y={FURN_Y+FURN_H-6} textAnchor="middle"
              fill={G+'.26)'} fontSize="5.5" fontFamily="monospace">BLOWER</text>
            {/* Flue — original routing:
                exits top of furnace HX → short rise → 45° elbow LEFT
                → horizontal run left past unit → 45° elbow UP → vertical through roof */}
            {(()=>{
              const PIPE_W=is90?6:9;
              const PIPE_C=is90?"#bfdbfe":"#d0d0d0";
              const PIPE_S=is90?"#93c5fd":"#aaa";
              const EXIT_X=UNIT_X+UNIT_W*0.38;
              const EXIT_Y=FURN_Y;
              const ELB1_Y=EXIT_Y-20;
              const HORIZ_X=UNIT_X-56;
              const ELB2_Y=ELB1_Y;
              const TOP_Y=DUCT_TOP+4;
              const ELBOW_R=9;
              return <>
                {/* Short vertical stub from furnace top up to elbow 1 */}
                <rect x={EXIT_X-PIPE_W/2} y={ELB1_Y+ELBOW_R} width={PIPE_W} height={EXIT_Y-ELB1_Y-ELBOW_R}
                  fill={PIPE_C} stroke={PIPE_S} strokeWidth="0.8"/>
                {/* 45° elbow 1: turn left */}
                <path d={`M${EXIT_X-PIPE_W/2} ${ELB1_Y+ELBOW_R} Q${EXIT_X-PIPE_W/2} ${ELB1_Y} ${EXIT_X-PIPE_W/2-ELBOW_R} ${ELB1_Y}`}
                  fill="none" stroke={PIPE_S} strokeWidth={PIPE_W} strokeLinecap="round"/>
                {/* Horizontal run left */}
                <rect x={HORIZ_X+ELBOW_R} y={ELB1_Y-PIPE_W} width={EXIT_X-PIPE_W/2-ELBOW_R-HORIZ_X-ELBOW_R} height={PIPE_W}
                  fill={PIPE_C} stroke={PIPE_S} strokeWidth="0.8"/>
                {/* 45° elbow 2: turn up */}
                <path d={`M${HORIZ_X+ELBOW_R} ${ELB1_Y-PIPE_W} Q${HORIZ_X} ${ELB1_Y-PIPE_W} ${HORIZ_X} ${ELB2_Y-ELBOW_R-PIPE_W}`}
                  fill="none" stroke={PIPE_S} strokeWidth={PIPE_W} strokeLinecap="round"/>
                {/* Vertical run up through roof */}
                <rect x={HORIZ_X-PIPE_W/2} y={TOP_Y} width={PIPE_W} height={ELB2_Y-ELBOW_R-PIPE_W-TOP_Y}
                  fill={PIPE_C} stroke={PIPE_S} strokeWidth="0.8"/>
                {/* Cap */}
                {is90
                  ?<rect x={HORIZ_X-PIPE_W-1} y={TOP_Y-5} width={PIPE_W*2+2} height={6} rx="1"
                      fill={PIPE_C} stroke={PIPE_S} strokeWidth="0.7"/>
                  :<path d={`M${HORIZ_X-PIPE_W-3} ${TOP_Y+2} L${HORIZ_X} ${TOP_Y-5} L${HORIZ_X+PIPE_W+3} ${TOP_Y+2}`}
                      fill={PIPE_C}/>}
                <text x={HORIZ_X-PIPE_W-6} y={TOP_Y+16} textAnchor="end"
                  fill={is90?"rgba(147,197,253,.55)":"rgba(185,185,185,.5)"}
                  fontSize="7" fontFamily="monospace">{is90?'PVC FLUE':'B-VENT'}</text>
              </>;
            })()}
            <rect x={UNIT_X+4} y={FURN_Y+11} width={isComm?62:is2?52:44} height="8" rx="2" fill={isComm?"url(#blue)":(G+'.1)')}/>
            <text x={UNIT_X+7} y={FURN_Y+18} fill={isComm?"#fff":(G+'.78)')} fontSize="5.5" fontFamily="monospace">{isComm?'COMMUNICATING':is2?'2-STAGE':'1-STAGE'}</text>
            <text x={UNIT_X+UNIT_W/2} y={FURN_Y+FURN_H+12} textAnchor="middle"
              fill={furnaceActive?'rgba(249,115,22,.62)':(G+'.36)')} fontSize="8" fontFamily="monospace">FURNACE</text>
          </g>}

          {/* Aprilaire — between bottom of unit and 2x4 chase */}
          {hasCoil&&hasAprilaire&&<g className="fadein" key="apr-c">
            <rect x={UNIT_X} y={APR_Y} width={UNIT_W} height={APR_H} rx="2"
              fill="rgba(34,197,94,.1)" stroke="#22c55e" strokeWidth="1.4"/>
            {Array.from({length:14},(_,i)=>(
              <line key={i} x1={UNIT_X+5+i*(UNIT_W-10)/14} y1={APR_Y+2}
                x2={UNIT_X+5+i*(UNIT_W-10)/14} y2={APR_Y+APR_H-2}
                stroke="#22c55e" strokeWidth="0.6" opacity="0.52"/>
            ))}
            <text x={UNIT_X+UNIT_W/2} y={APR_Y-5} textAnchor="middle"
              fill="#22c55e" fontSize="9.5" fontFamily="monospace">APRILAIRE 5" FILTER RACK</text>
          </g>}

          {/* Condensate drain — routed: exits right face of A-coil bottom
              → 90° RIGHT → 90° DOWN beside furnace right face → 45° into chase */}
          {hasCoil&&<g key="drain">
            {(()=>{
              const DW=2.5;  // pipe visual width
              const DC=B+'.5)';
              const DCD=B+'.35)';
              const hasPump=Array.isArray(a.extras)&&a.extras.includes('condensate');

              // Start: right face of A-coil, near the bottom (drain pan)
              const startX=UNIT_X+UNIT_W;
              const startY=ACOIL_Y+ACOIL_H-12;

              // Horizontal run right — clear of the unit
              const rightX=UNIT_X+UNIT_W+32;
              // Always run straight down to chase regardless of pump
              const downToY=CHASE_Y-16;
              const ang=14;

              return <>
                {/* Horizontal stub right from coil */}
                <line x1={startX} y1={startY} x2={rightX} y2={startY}
                  stroke={DCD} strokeWidth="3" strokeLinecap="round" strokeDasharray="5 3"/>
                {/* 90° elbow corner */}
                <path d={`M${rightX} ${startY-3} Q${rightX+3} ${startY} ${rightX} ${startY+3}`}
                  fill="none" stroke={DCD} strokeWidth="3" strokeLinecap="round"/>
                {/* Vertical run down beside furnace */}
                <line x1={rightX} y1={startY} x2={rightX} y2={downToY}
                  stroke={DCD} strokeWidth="3" strokeLinecap="round" strokeDasharray="5 3"/>
                {/* 45° into chase */}
                <path d={`M${rightX} ${downToY} L${rightX-ang} ${downToY+ang}`}
                  fill="none" stroke={DCD} strokeWidth="3" strokeLinecap="round"/>
                {/* Entry dot or line to pump */}
                {hasPump
                  ?<line x1={rightX-ang} y1={downToY+ang} x2={UNIT_X+UNIT_W-6} y2={downToY+ang}
                      stroke={DCD} strokeWidth="2" strokeDasharray="4 3" strokeLinecap="round"/>
                  :<circle cx={rightX-ang} cy={downToY+ang} r="4"
                      fill={B+'.25)'} stroke={B+'.5)'} strokeWidth="1"/>
                }
                {/* Label */}
                <text x={rightX+6} y={startY-5} textAnchor="start"
                  fill={B+'.45)'} fontSize="6.5" fontFamily="monospace">CONDENSATE</text>
              </>;
            })()}
          </g>}

          {/* 2×4 return chase + optional condensate pump inside */}
          {hasCoil&&<g className="snap" key="chase">
            <rect x={UNIT_X-6} y={CHASE_Y} width={UNIT_W+12} height={CHASE_H} rx="3"
              fill="rgba(100,75,34,.07)" stroke="rgba(138,98,42,.42)" strokeWidth="1.5"/>
            {[0,1,2,3,4,5].map(i=>(
              <rect key={i} x={UNIT_X-6+i*(UNIT_W+12)/6} y={CHASE_Y} width={11} height={CHASE_H}
                fill="rgba(118,82,32,.18)" stroke="rgba(148,104,40,.28)" strokeWidth="0.7"/>
            ))}
            <rect x={UNIT_X+6} y={CHASE_Y+5} width={UNIT_W-12} height={CHASE_H-10}
              fill="rgba(35,137,224,.03)" stroke={B+'.1)'} strokeWidth="0.5" strokeDasharray="4 3"/>
            <path d={`M${UNIT_X+UNIT_W/2} ${CHASE_Y+CHASE_H-6} L${UNIT_X+UNIT_W/2} ${CHASE_Y+12}`}
              fill="none" stroke={W+'.09)'} strokeWidth="1.2"
              strokeDasharray="5 3" className="airflow" style={{strokeDashoffset:0}} markerEnd="url(#arr)"/>
            <text x={UNIT_X+UNIT_W/2} y={CHASE_Y+CHASE_H+14} textAnchor="middle"
              fill="rgba(138,98,42,.62)" fontSize="9.5" fontFamily="monospace">2×4 RETURN AIR CHASE</text>
            {/* Condensate pump — sits inside chase on the right side */}
            {Array.isArray(a.extras)&&a.extras.includes('condensate')&&<g className="fadein">
              {(()=>{
                const pW=52, pH=CHASE_H-14;
                const pX=UNIT_X+UNIT_W-pW-8;
                const pY=CHASE_Y+7;
                return <>
                  <rect x={pX} y={pY} width={pW} height={pH} rx="3"
                    fill="rgba(35,137,224,.14)" stroke={B+'.55)'} strokeWidth="1.2"/>
                  <text x={pX+pW/2} y={pY+pH*0.45} textAnchor="middle"
                    fill={B+'.8)'} fontSize="8" fontFamily="monospace">PUMP</text>
                  <text x={pX+pW/2} y={pY+pH*0.75} textAnchor="middle"
                    fill={B+'.55)'} fontSize="6" fontFamily="monospace">COND.</text>
                </>;
              })()}
            </g>}
          </g>}

          {/* ── REFRIGERANT LINE STUBS — exit right face of A-coil, run to wall ── */}
          {hasCoil&&hasCond&&<g key="rl-c">
            {/* Foam sleeve background */}
            <path d={`M${UNIT_X+UNIT_W} ${LS_Y1} L${EXT_WALL_X} ${LS_Y1}`}
              fill="none" stroke="rgba(22,22,42,.55)" strokeWidth="10" strokeLinecap="round"/>
            {/* Liquid line */}
            <path d={`M${UNIT_X+UNIT_W} ${LS_Y1} L${EXT_WALL_X} ${LS_Y1}`}
              fill="none" stroke={evapActive?evapC:'rgba(30,30,50,.5)'} strokeWidth="3.5"
              strokeLinecap="round" className="draw"/>
            {/* Suction line */}
            <path d={`M${UNIT_X+UNIT_W} ${LS_Y2} L${EXT_WALL_X} ${LS_Y2}`}
              fill="none" stroke={evapActive?evapC2:'rgba(30,30,50,.4)'} strokeWidth="3.5"
              strokeLinecap="round" className="draw" style={{animationDelay:'.1s'}}/>
            {/* Flow dots */}
            {evapActive&&Array.from({length:3},(_,i)=>(
              <circle key={i} r="3.5" fill={i%2===0?evapC:evapC2} opacity="0.72" filter="url(#glow-sm)">
                <animateMotion dur={(1.6+i*0.3)+'s'} repeatCount="indefinite" begin={i*0.5+'s'}
                  path={refReversed
                    ?`M${EXT_WALL_X} ${LS_Y1} L${UNIT_X+UNIT_W} ${LS_Y1}`
                    :`M${UNIT_X+UNIT_W} ${LS_Y1} L${EXT_WALL_X} ${LS_Y1}`}/>
              </circle>
            ))}
          </g>}

          {/* ── OUTSIDE ZONE — wall + condenser, condenser aligned with unit height ── */}
          {hasCond&&<OutsideZone
            wallX={EXT_WALL_X} zoneW={OUTSIDE_ZONE_W} zoneH={VH}
            condX={COND_X} condY={COND_Y} condW={COND_W} condH={COND_H}
            lineY1={LS_Y1} lineY2={LS_Y2}
            tierKey={a.cond_tier} active={condenserActive}/>}

          {/* Thermostat */}
          {hasTstat&&<g className="snap" key="tstat-c" style={{animationDelay:'.26s'}}>
            {(()=>{
              const TX=10, TY=hasFurnace?FURN_Y-36:ACOIL_Y+20; // at coil/furnace junction
              return a.thermostat==='wifi'
                ?<>
                  <circle cx={TX+38} cy={TY+38} r={36} fill="#0d0d0d" stroke={G+'.62)'} strokeWidth="1.8"/>
                  <circle cx={TX+38} cy={TY+38} r={28} fill="#060e1c" stroke={B+'.42)'} strokeWidth="1.1"/>
                  <text x={TX+38} y={TY+43} textAnchor="middle" fill={B+'.92)'} fontSize="17"
                    fontFamily="monospace" filter="url(#glow)">{heatMode?'68°':'72°'}</text>
                  <path d={`M${TX+12} ${TY+38} A26 26 0 0 1 ${TX+64} ${TY+38}`}
                    fill="none" stroke={heatMode?"#f97316":"#2389e0"} strokeWidth="2.5" strokeLinecap="round" opacity="0.55"/>
                  <path d={`M${TX+24} ${TY+62} Q${TX+38} ${TY+53} ${TX+52} ${TY+62}`}
                    fill="none" stroke={B+'.5)'} strokeWidth="1.8" strokeLinecap="round"/>
                  <path d={`M${TX+28} ${TY+67} Q${TX+38} ${TY+61} ${TX+48} ${TY+67}`}
                    fill="none" stroke={B+'.7)'} strokeWidth="1.8" strokeLinecap="round"/>
                  <circle cx={TX+38} cy={TY+71} r={2.5} fill={B+'.8)'}/>
                  <text x={TX+38} y={TY+85} textAnchor="middle" fill={G+'.45)'} fontSize="8.5" fontFamily="monospace">WI-FI SMART</text>
                </>
                :<>
                  <rect x={TX} y={TY} width={76} height={62} rx="3"
                    fill="#0d0d0d" stroke={G+'.55)'} strokeWidth="1.6"/>
                  <rect x={TX+5} y={TY+6} width={66} height={34} rx="2"
                    fill="#050d18" stroke={B+'.36)'} strokeWidth="0.9"/>
                  <text x={TX+38} y={TY+28} textAnchor="middle" fill={B+'.9)'} fontSize="17"
                    fontFamily="monospace" filter="url(#glow)">{heatMode?'68°':'72°'}</text>
                  {[10,24,38,52,66].map((bx,i)=>(
                    <rect key={i} x={TX+bx-4} y={TY+46} width="9" height="5" rx="1.5"
                      fill={G+'.22)'} stroke={G+'.12)'} strokeWidth="0.4"/>
                  ))}
                  <text x={TX+38} y={TY+58} textAnchor="middle" fill={G+'.38)'} fontSize="8" fontFamily="monospace">BASIC</text>
                </>;
            })()}
          </g>}

          {/* Dehumidifier — small box, top-RIGHT corner of attic */}
          {hasDehu&&<g className="snap" key="dehu-c" style={{animationDelay:'.32s'}}>
            {(()=>{
              const DW=72, DH=52;
              const DX=HOUSE_W-DW-12;
              const DY=DECK_Y-DH-28;
              return <>
                <rect x={DX} y={DY} width={DW} height={DH} rx="4"
                  fill="#05120a" stroke="#22c55e" strokeWidth="1.4"/>
                <rect x={DX} y={DY} width={DW} height={8} rx="4" fill="rgba(34,197,94,.3)" stroke="none"/>
                {Array.from({length:5},(_,i)=>(
                  <line key={i} x1={DX+6} y1={DY+12+i*7} x2={DX+DW-6} y2={DY+12+i*7}
                    stroke="rgba(34,197,94,.28)" strokeWidth="1"/>
                ))}
                <text x={DX+DW/2} y={DY+DH/2-2} textAnchor="middle" fill="#22c55e" fontSize="10">💧</text>
                <text x={DX+DW/2} y={DY+DH/2+12} textAnchor="middle"
                  fill="#22c55e" fontSize="7.5" fontFamily="monospace">DEHU</text>
                {/* Drain line down to deck */}
                <line x1={DX+DW/2} y1={DY+DH} x2={DX+DW/2} y2={DECK_Y}
                  stroke={B+'.35)'} strokeWidth="1.5" strokeDasharray="3 2"/>
                <text x={DX+DW/2} y={DY-6} textAnchor="middle"
                  fill="rgba(34,197,94,.38)" fontSize="6" fontFamily="monospace">DEHUMIDIFIER</text>
              </>;
            })()}
          </g>}

          {/* ERV — small box, top-LEFT corner of attic, with roof penetration pipes */}
          {Array.isArray(a.extras)&&a.extras.includes('erv')&&<g className="snap" key="erv-c" style={{animationDelay:'.34s'}}>
            {(()=>{
              const DW=72, DH=52;
              const DX=12;
              const DY=DECK_Y-DH-28;
              // Two pipes through roof — fresh air in (left) and exhaust out (right)
              const pipe1X=DX+DW*0.28;  // fresh air intake pipe
              const pipe2X=DX+DW*0.68;  // exhaust pipe
              const pipeTop=4;           // exits well above roofline
              const pipeW=5;
              return <>
                {/* Fresh air intake pipe — through roof, caps at top */}
                <rect x={pipe1X-pipeW/2} y={pipeTop} width={pipeW} height={DY-pipeTop} rx="1"
                  fill={B+'.35)'} stroke={B+'.5)'} strokeWidth="0.8"/>
                <rect x={pipe1X-pipeW-1} y={pipeTop-3} width={pipeW*2+2} height={5} rx="1"
                  fill={B+'.4)'} stroke={B+'.55)'} strokeWidth="0.8"/>
                {/* Exhaust pipe — through roof */}
                <rect x={pipe2X-pipeW/2} y={pipeTop} width={pipeW} height={DY-pipeTop} rx="1"
                  fill="rgba(249,115,22,.35)" stroke="rgba(249,115,22,.5)" strokeWidth="0.8"/>
                <path d={`M${pipe2X-pipeW-1} ${pipeTop+2} L${pipe2X} ${pipeTop-4} L${pipe2X+pipeW+1} ${pipeTop+2}`}
                  fill="rgba(249,115,22,.4)"/>
                {/* Labels above roof */}
                <text x={pipe1X} y={pipeTop-6} textAnchor="middle"
                  fill={B+'.5)'} fontSize="5" fontFamily="monospace">IN</text>
                <text x={pipe2X} y={pipeTop-6} textAnchor="middle"
                  fill="rgba(249,115,22,.5)" fontSize="5" fontFamily="monospace">OUT</text>
                {/* Box */}
                <rect x={DX} y={DY} width={DW} height={DH} rx="4"
                  fill="#0a0a06" stroke={G+'.55)'} strokeWidth="1.4"/>
                <rect x={DX} y={DY} width={DW} height={8} rx="4" fill={G+'.25)'} stroke="none"/>
                <path d={`M${DX+8} ${DY+DH*0.44} L${DX+DW*0.5-4} ${DY+DH*0.44}`}
                  fill="none" stroke={B+'.65)'} strokeWidth="2" markerEnd="url(#arr)"/>
                <path d={`M${DX+DW-8} ${DY+DH*0.65} L${DX+DW*0.5+4} ${DY+DH*0.65}`}
                  fill="none" stroke="rgba(249,115,22,.65)" strokeWidth="2" markerEnd="url(#arr)"/>
                <text x={DX+DW/2} y={DY+DH*0.33} textAnchor="middle"
                  fill={G+'.78)'} fontSize="9" fontFamily="monospace">ERV</text>
                <text x={DX+DW/2} y={DY+DH*0.82} textAnchor="middle"
                  fill={G+'.5)'} fontSize="6" fontFamily="monospace">ENERGY RECOV.</text>
                <text x={DX+DW/2} y={DY-6} textAnchor="middle"
                  fill={G+'.35)'} fontSize="6" fontFamily="monospace">ATTIC MOUNT</text>
              </>;
            })()}
          </g>}
        </svg>
      </div>
    );
  }

  // Fallback
  return null;
}
// ─── APP ────────────────────────────────────────────────────────
function App(){
  const [answers,setAnswers]=useState({});
  const [stepIdx,setStepIdx]=useState(0);
  const [done,setDone]=useState(false);
  const [isLandscape,setIsLandscape]=useState(()=>window.innerWidth>window.innerHeight);
  const topRef=useRef(null);
  const scrollTop=useCallback(()=>setTimeout(()=>topRef.current?.scrollIntoView({behavior:'smooth',block:'start'}),50),[]);

  // Track orientation changes
  React.useEffect(()=>{
    const check=()=>setIsLandscape(window.innerWidth>window.innerHeight);
    window.addEventListener('resize',check);
    window.addEventListener('orientationchange',check);
    return()=>{window.removeEventListener('resize',check);window.removeEventListener('orientationchange',check);};
  },[]);

  const activeSteps=useMemo(()=>STEPS.filter(s=>!s.showIf||s.showIf(answers)),[answers]);
  const cur=activeSteps[stepIdx];
  const pct=Math.round(((stepIdx+1)/activeSteps.length)*100);

  const sel=id=>answers[id];
  const msel=id=>Array.isArray(answers[id])?answers[id]:[];
  const setA=(k,v)=>setAnswers(p=>{
    const next={...p,[k]:v};
    if(k==='insulation') next.furnace_eff=deriveFurnaceEff(v);
    return next;
  });
  const toggle=(k,v)=>setAnswers(p=>{const c=Array.isArray(p[k])?p[k]:[];return{...p,[k]:c.includes(v)?c.filter(x=>x!==v):[...c,v]};});

  const canNext=useMemo(()=>{
    if(!cur)return false;
    if(cur.optional||cur.multi)return true;
    return!!answers[cur.id];
  },[cur,answers]);

  const goNext=()=>{if(stepIdx<activeSteps.length-1){setStepIdx(s=>s+1);scrollTop();}else{setDone(true);scrollTop();}};
  const goBack=()=>{
    if(stepIdx>0){
      const curId=cur?.id;
      if(curId){setAnswers(p=>{const n={...p};delete n[curId];return n;});}
      setStepIdx(s=>s-1);
      scrollTop();
    }
  };
  const skip=()=>{if(cur.multi)setA(cur.id,[]);goNext();};
  const restart=()=>{setAnswers({});setStepIdx(0);setDone(false);};

  const opts=useMemo(()=>cur?getOpts(cur.id,answers):[], [cur,answers]);

  // Attic = wide horizontal system → best in landscape
  // Upflow = tall vertical stack → best in portrait
  const isAttic=!answers.location||answers.location==='attic';
  const isMobile=window.innerWidth<768||(window.innerWidth<1100&&'ontouchstart' in window);

  // Show rotate nudge for attic on portrait mobile
  const showRotateNudge=isAttic&&isMobile&&!isLandscape&&answers.location;

  // Landscape attic: side-by-side layout; everything else: stacked
  const mainClass=isAttic&&isLandscape&&isMobile?'main main--landscape':'main';

  const sidebar=(
    <div className="sidebar">
      {!done?(
        <>
          <div className="step-hdr">
            <div className="step-eyebrow">Step {stepIdx+1} of {activeSteps.length}</div>
            <div className="step-q">{cur?.q}</div>
            {cur?.hint&&<div className="step-hint">{cur.hint}</div>}
          </div>

          <div className="opts">
            {opts.map(opt=>{
              const isMulti=cur?.multi;
              const isOn=isMulti?msel(cur.id).includes(opt.v):sel(cur?.id)===opt.v;
              const isDisabled=!!opt.disabled;
              const click=isDisabled?null:isMulti?()=>toggle(cur.id,opt.v):()=>{
                setA(cur.id,opt.v);
                if(!isMulti){
                  setTimeout(()=>{
                    if(stepIdx<activeSteps.length-1){setStepIdx(s=>s+1);scrollTop();}
                    else{setDone(true);scrollTop();}
                  },320);
                }
              };
              return(
                <button key={opt.v} className={`opt${isOn?' sel':''}${isDisabled?' disabled':''}`} onClick={click}>
                  <div className="opt-inner">
                    <div className="opt-body">
                      <span className="opt-label">
                        {opt.label}
                        {opt.badge&&<span className="opt-badge">★ GES</span>}
                        {opt.recommended&&<span className="opt-badge" style={{marginLeft:6}}>Recommended</span>}
                      </span>
                      {opt.desc&&<span className="opt-desc">{opt.desc}</span>}
                      {opt.note&&<span className="opt-note">{opt.note}</span>}
                      {opt.disabledNote&&<span className="opt-note" style={{color:'rgba(249,115,22,.6)'}}>{opt.disabledNote}</span>}
                    </div>
                    <div className="opt-check">{isOn?'✓':''}</div>
                  </div>
                </button>
              );
            })}
          </div>

          <div className="nav-row">
            {stepIdx>0&&<button className="btn-back" onClick={goBack}>← Back</button>}
            {(cur?.optional||cur?.multi)&&<button className="btn-skip" onClick={skip}>Skip</button>}
            <button className="btn-next" onClick={goNext} disabled={!canNext}>
              {stepIdx===activeSteps.length-1?'See Full Build →':'Next →'}
            </button>
          </div>
        </>
      ):(
        <div className="done-wrap">
          <div className="done-icon">✓</div>
          <div className="done-title">Your System is Built</div>
          <div className="done-sub">Every component you selected is visualized to the left. A Gold Eagle tech will walk you through the full install — free, about 30 minutes on-site.</div>
          <a href="tel:5124894653" className="done-cta">📞 Schedule Your Free Visit — 512-489-4653</a>
          <button className="done-restart" onClick={restart}>Start over</button>
        </div>
      )}
    </div>
  );

  return(
    <div ref={topRef} style={{display:'flex',flexDirection:'column',height:'100%',minHeight:0}}>
      <header className="hdr">
        <div className="hdr-logo">GOLD EAGLE SERVICES™</div>
        <div className="hdr-step">{cur?`${cur.id.replace(/_/g,' ').toUpperCase()}`:done?'COMPLETE':''}</div>
        <div style={{fontFamily:'var(--fm)',fontSize:'9px',color:'rgba(215,183,64,.4)',letterSpacing:'.15em',whiteSpace:'nowrap'}}>BUILD YOUR SYSTEM</div>
      </header>
      <div className="prog"><div className="prog-fill" style={{width:done?'100%':`${pct}%`}}/></div>

      {/* Rotate nudge — attic in portrait mobile */}
      {showRotateNudge&&(
        <div style={{
          background:'rgba(215,183,64,.08)',borderBottom:'1px solid rgba(215,183,64,.18)',
          padding:'8px 16px',display:'flex',alignItems:'center',gap:'10px',
          fontFamily:'var(--fb)',fontSize:'12px',color:'rgba(215,183,64,.8)',
        }}>
          <span style={{fontSize:'18px'}}>↺</span>
          <span>Rotate your phone sideways for the best attic view</span>
        </div>
      )}

      <div className={mainClass}>
        <div className="canvas-wrap">
          <div className="canvas-grid"/>
          <div className="canvas-tag">Live System Preview</div>
          <Canvas a={answers}/>
        </div>
        {sidebar}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
