<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Build Your System | Gold Eagle Services</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --gl:#f0d64e;--gm:#d7b740;--gd:#ab8024;
  --bk:#080808;--panel:#0f0f0f;--surf:#161616;--border:#232323;
  --wh:#fff;--dim:rgba(255,255,255,.72);--mut:rgba(255,255,255,.36);
  --gh:linear-gradient(90deg,#f0d64e,#d7b740,#ab8024);
  --gd2:linear-gradient(135deg,#f0d64e,#d7b740,#ab8024);
  --blue:#2389e0;--green:#22c55e;--orange:#f97316;--purple:#8b5cf6;
  --ft:'Lora',Georgia,serif;--fm:'Share Tech Mono',monospace;--fb:'Trebuchet MS',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bk);color:var(--wh);font-family:var(--fb);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.025) 0px,rgba(0,0,0,.025) 1px,transparent 1px,transparent 2px);pointer-events:none;z-index:9999}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:100;gap:8px}
.hdr-logo{font-family:var(--ft);font-weight:700;font-size:13px;background:var(--gh);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:.04em;white-space:nowrap}
.hdr-step{font-family:var(--fm);font-size:8px;color:rgba(215,183,64,.5);letter-spacing:.16em;text-transform:uppercase;text-align:center;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-total-wrap{text-align:right;display:none}

/* PROGRESS */
.prog{height:3px;background:rgba(215,183,64,.1);flex-shrink:0}
.prog-fill{height:100%;background:var(--gh);transition:width .55s cubic-bezier(.4,0,.2,1)}

/* ── BASE (mobile-first) ── */
.main{display:flex;flex-direction:column}

/* CANVAS */
.canvas-wrap{position:relative;background:var(--bk);display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden;min-height:260px;flex-shrink:0}
@media(min-width:700px){.canvas-wrap{min-height:360px}}
.canvas-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(215,183,64,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(215,183,64,.03) 1px,transparent 1px);background-size:36px 36px;pointer-events:none}
.canvas-tag{position:absolute;top:8px;left:12px;font-family:var(--fm);font-size:8px;color:rgba(215,183,64,.28);letter-spacing:.14em;text-transform:uppercase}
.canvas-svg{width:100%;max-width:960px;display:block}

/* SIDEBAR mobile */
.sidebar{background:var(--panel);border-top:1px solid var(--border);display:flex;flex-direction:column}

/* OPTIONS mobile */
.opts{padding:10px 12px;display:flex;flex-direction:column;gap:8px}

/* ── DESKTOP: everything locked to viewport, zero page scroll ── */
@media(min-width:1100px){
  /* Lock the whole page */
  html{height:100%;overflow:hidden}
  body{height:100%;overflow:hidden;min-height:unset}

  /* Header + progress bar are a fixed-height top strip */
  .hdr{position:relative;flex-shrink:0}
  .prog{flex-shrink:0}

  /* Root div fills remaining height */
  #root{display:flex;flex-direction:column;height:100%}
  #root>div{display:flex;flex-direction:column;height:100%;min-height:0}

  /* Main fills all remaining space after header+progress */
  .main{
    flex-direction:row;
    flex:1;
    min-height:0;   /* critical — lets flex child shrink below content size */
    overflow:hidden;
  }

  /* Canvas: fills all leftover width, no scroll */
  .canvas-wrap{
    flex:1;
    min-height:unset;
    height:100%;
    overflow:hidden;
    align-items:center;
    padding:16px;
  }
  .canvas-svg{
    width:100%;
    height:100%;
    max-width:none;
    max-height:100%;
  }

  /* Sidebar: fixed width column, scrolls internally */
  .sidebar{
    width:340px;
    flex:none;
    border-top:none;
    border-left:1px solid var(--border);
    height:100%;
    min-height:0;
    display:flex;
    flex-direction:column;
    overflow:hidden;  /* sidebar itself does NOT scroll */
  }

  /* Step header sticks to top of sidebar */
  .step-hdr{flex-shrink:0}

  /* Opts list fills remaining sidebar height and scrolls if needed */
  .opts{
    flex:1;
    min-height:0;
    overflow-y:auto;
    overflow-x:hidden;
    padding:10px 12px;
    gap:7px;
  }

  /* Nav row sticks to bottom of sidebar */
  .nav-row{flex-shrink:0;position:relative;bottom:unset}

  /* Tighten option cards slightly on desktop */
  .opt-inner{padding:10px 12px 10px 15px}
  .opt-label{font-size:14px}
  .opt-desc{font-size:11.5px}
  .step-q{font-size:16px}
}

/* ── ANIMATIONS ── */
.snap{animation:snap .45s cubic-bezier(.34,1.46,.64,1) both}
@keyframes snap{from{opacity:0;transform:translateY(-14px) scale(.93)}to{opacity:1;transform:translateY(0) scale(1)}}
.fadein{animation:fadein .3s ease both}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.draw{stroke-dasharray:300;stroke-dashoffset:300;animation:draw .7s ease forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.spin{animation:spin 4s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.airflow{stroke-dasharray:10 6;animation:airflow 2s linear infinite}
@keyframes airflow{to{stroke-dashoffset:-32}}
.glow-pulse{animation:gpulse 2.5s ease-in-out infinite}
@keyframes gpulse{0%,100%{opacity:.5}50%{opacity:1}}

/* ── LANDSCAPE: mobile attic rotated sideways ── */
.main--landscape{flex-direction:row!important;height:calc(100dvh - 46px)!important;min-height:unset!important;overflow:hidden!important}
.main--landscape .canvas-wrap{flex:1;min-height:unset;height:100%;overflow:hidden;padding:8px}
.main--landscape .sidebar{width:250px!important;flex:none;border-top:none!important;border-left:1px solid var(--border);overflow-y:auto;height:100%;display:flex;flex-direction:column}
.main--landscape .opts{overflow-y:auto;flex:1;min-height:0;gap:5px;padding:8px 10px}
.main--landscape .step-q{font-size:13px}
.main--landscape .opt-label{font-size:12px}
.main--landscape .opt-desc{font-size:10.5px}
.main--landscape .opt-inner{padding:9px 10px 9px 13px}
.main--landscape .step-hdr{padding:10px 12px 8px}
.main--landscape .nav-row{padding:8px 10px;flex-shrink:0;position:relative;bottom:unset}
.step-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:10}
.step-eyebrow{font-family:var(--fm);font-size:8px;color:var(--gm);letter-spacing:.2em;text-transform:uppercase;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.step-eyebrow::after{content:'';flex:1;height:1px;background:rgba(215,183,64,.15)}
.step-q{font-family:var(--ft);font-size:17px;font-weight:600;color:var(--wh);line-height:1.3;margin-bottom:4px}
.step-hint{font-size:12px;color:var(--mut);line-height:1.5}

/* OPTIONS — bigger touch targets */
.opts{padding:10px 12px;display:flex;flex-direction:column;gap:8px;flex:1}
.opt{background:var(--surf);border:1px solid var(--border);cursor:pointer;text-align:left;outline:none;-webkit-appearance:none;transition:border-color .15s,background .15s;position:relative;overflow:hidden;border-radius:2px}
.opt:active{background:#1c1c1c}
.opt.sel{border-color:var(--gl);background:rgba(240,214,78,.05)}
.opt.sel::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gh)}
.opt.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.opt-inner{display:flex;align-items:flex-start;gap:10px;padding:13px 14px 13px 17px}
.opt-body{flex:1;min-width:0}
.opt-label{font-family:var(--ft);font-size:15px;font-weight:600;color:var(--wh);display:block;margin-bottom:3px;line-height:1.3}
.opt.sel .opt-label{color:var(--gl)}
.opt-desc{font-size:12.5px;color:var(--dim);line-height:1.5;display:block}
.opt.sel .opt-desc{color:rgba(240,214,78,.6)}
.opt-price{font-family:var(--fm);font-size:11px;color:rgba(215,183,64,.65);display:block;margin-top:2px}
.opt.sel .opt-price{color:var(--gl)}
.opt-badge{display:inline-block;background:var(--gh);color:var(--bk);font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:1px 6px;margin-left:6px;vertical-align:middle}
.opt-note{font-size:10.5px;color:rgba(240,214,78,.45);margin-top:3px;display:block;font-style:italic}
.opt-check{width:20px;height:20px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;margin-top:1px;transition:all .15s;border-radius:2px}
.opt.sel .opt-check{border-color:var(--gl);background:var(--gm);color:var(--bk)}

/* INFO CARD */
.info-card{margin:0 12px 8px;padding:10px 12px;background:rgba(215,183,64,.05);border:1px solid rgba(215,183,64,.15);font-size:11.5px;color:rgba(255,255,255,.45);line-height:1.55}
.info-card strong{color:rgba(255,255,255,.7)}

/* NAV */
.nav-row{padding:12px;border-top:1px solid var(--border);display:flex;gap:8px;background:var(--panel);position:sticky;bottom:0}
.btn-back{flex:0 0 auto;background:transparent;border:1px solid var(--border);color:var(--mut);padding:12px 18px;font-family:var(--fb);font-size:13px;cursor:pointer;transition:border-color .2s,color .2s;outline:none;min-width:60px}
.btn-back:active{border-color:rgba(255,255,255,.3);color:rgba(255,255,255,.7)}
.btn-next{flex:1;background:var(--gh);border:none;color:var(--bk);padding:13px 16px;font-family:var(--ft);font-size:14px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .2s;outline:none;min-height:48px}
.btn-next:active:not(:disabled){opacity:.8}
.btn-next:disabled{opacity:.22;cursor:not-allowed}
.btn-skip{background:transparent;border:none;color:rgba(255,255,255,.22);font-family:var(--fb);font-size:12px;cursor:pointer;text-decoration:underline;outline:none;padding:0 4px;white-space:nowrap;min-height:48px}

/* DONE */
.done-wrap{padding:28px 20px;text-align:center;animation:snap .35s ease both;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.done-icon{width:60px;height:60px;background:var(--gh);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:24px;color:var(--bk);font-weight:700}
.done-title{font-family:var(--ft);font-size:22px;font-weight:700;color:var(--wh);margin-bottom:10px}
.done-sub{font-size:13px;color:var(--mut);max-width:300px;margin:0 auto 24px;line-height:1.7}
.done-cta{display:block;width:100%;background:var(--gh);border:none;color:var(--bk);padding:16px;font-family:var(--ft);font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.04em;margin-bottom:12px;text-decoration:none;text-align:center;border-radius:2px}
.done-restart{background:transparent;border:none;color:rgba(255,255,255,.22);font-family:var(--fb);font-size:12px;cursor:pointer;text-decoration:underline;outline:none}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useMemo,useRef,useCallback}=React;

// ─── STEPS ──────────────────────────────────────────────────────
const STEPS=[
  {id:'location',    q:'Where is your indoor unit?',
    hint:'This sets the layout of your system visualization.',        optional:false},
  {id:'indoor_type', q:'Furnace or air handler?',
    hint:'Furnace = gas heat. Air handler = all-electric heat pump.', optional:false},
  {id:'insulation',  q:'What type of attic insulation do you have?',
    hint:'Fiberglass = 80% furnace. Spray foam = 90% furnace with PVC flue.', optional:false,
    showIf:a=>a.indoor_type==='furnace'},
  {id:'plenum',      q:'Does the supply plenum need replacing?',
    hint:'The plenum connects your indoor unit to your duct system.', optional:false},
  {id:'thermostat',  q:'Which thermostat?',
    hint:'Smart thermostats save 10–15% on energy bills.',            optional:false},
  {id:'purif',       q:'Air purification add-ons?',
    hint:'Select any combination — installed inside the air handler.',optional:true, multi:true},
  {id:'system_for',  q:'Heat pump or straight cool?',
    hint:'Heat pump both heats and cools. Straight cool = AC only, furnace does all heating.', optional:false,
    showIf:a=>a.indoor_type==='furnace'},
  {id:'cond_tier',   q:'Choose your efficiency level.',
    hint:'Higher efficiency = lower monthly bills and better humidity control.', optional:false},
  {id:'dehu',        q:'Add a whole-home dehumidifier?',
    hint:"Austin's humidity makes your home feel 7°F warmer. Runs automatically with your system.", optional:false},
  {id:'extras',      q:'Any final add-ons?',
    hint:'Surge protector, condensate pump, or ERV.',                 optional:true, multi:true},
];

// Auto-derive furnace_eff from insulation — never ask separately
function deriveFurnaceEff(insulation){
  return insulation==='spray'?'e90':'e80';
}

// ─── OPTION DEFS ────────────────────────────────────────────────
function getOpts(stepId, answers){
  switch(stepId){
    case 'location':return[
      {v:'attic', label:'Attic',          desc:'Horizontal install — most common in Austin'},
      {v:'closet',label:'Interior closet',desc:'Upflow unit — hallway or utility closet'},
    ];
    case 'indoor_type':return[
      {v:'furnace',label:'Furnace',     desc:'Gas heat + AC — most popular in Austin. I have a gas line.'},
      {v:'ah',     label:'Air handler', desc:'All-electric heat pump — no gas line needed.'},
    ];
    case 'insulation':return[
      {v:'fiberglass',label:'Fiberglass batts / blown',desc:'Standard attic insulation — 80% AFUE furnace with standard B-vent flue'},
      {v:'spray',     label:'Spray foam',               desc:'Sealed attic — 90% AFUE furnace required, PVC condensing flue through roof deck'},
    ];
    case 'plenum':return[
      {v:'ductboard',label:'Ductboard plenum',  desc:'Standard — fits most attic horizontal installs'},
      {v:'metal',    label:'Sheet metal plenum',desc:'More durable — preferred for longevity'},
      {v:'none',     label:'Not needed',        desc:'Existing plenum is in good shape — no replacement required'},
    ];
    case 'thermostat':return[
      {v:'basic',label:'Basic',         desc:'Reliable programmable thermostat — simple, accurate, no subscription'},
      {v:'wifi', label:'Wi-Fi Enabled', desc:'Smart thermostat — app control, scheduling, energy reports',badge:true},
    ];
    case 'purif':return[
      {v:'aprilaire',label:'Aprilaire 5" Filter',desc:'Upgraded media filtration — captures dust, pollen, and allergens'},
      {v:'uv',       label:'UV Light System',    desc:'Kills mold and bacteria growing inside the evaporator coil'},
      {v:'ionizer',  label:'Ionizer / Plasma',   desc:'Reduces airborne particles, odors, and VOCs throughout the home'},
    ];
    case 'system_for':return[
      {v:'hp', label:'Heat pump + furnace', desc:'Heat pump handles cooling and mild-weather heating — gas furnace kicks in on the coldest days'},
      {v:'sc', label:'Straight cool',       desc:'AC only — the gas furnace handles all heating, no heat pump involved'},
    ];
    case 'cond_tier':{
      const isAH=answers.indoor_type==='ah';
      const isHP=isAH||(answers.system_for==='hp');
      return[
        {v:'fedmin',   label:'Federal Minimum',desc:'Meets current energy code — solid, reliable, lowest upfront cost'},
        {v:'mid_ge15', label:'Mid Efficiency',  desc:'Best overall value — GE Connect, meaningfully lower energy bills'},
        {v:'high_ge18',label:'High Efficiency', desc:'GE Connect inverter-driven — eligible for Austin Energy rebate, best humidity control',
          disabled:!isHP,
          disabledNote:!isHP?'Heat pump required for this tier':''},
      ];
    }
    case 'dehu':return[
      {v:'yes',label:'Yes — add it',  desc:'Whole-home unit sized to your space, runs automatically with your system'},
      {v:'no', label:'No thanks',     desc:'Skip for now'},
    ];
    case 'extras':return[
      {v:'surge',     label:'Surge Protector',       desc:'Protects condenser from voltage spikes — mounts directly on the disconnect'},
      {v:'condensate',label:'Condensate Pump',        desc:'Required when gravity drain isn\'t possible — mounts below the evaporator coil'},
      {v:'erv',       label:'ERV (Energy Recovery)',  desc:'Brings fresh outdoor air in while recovering conditioned energy — attic mounted'},
    ];
    default:return[];
  }
}
// ─── CANVAS ─────────────────────────────────────────────────────
function Canvas({a}){
  const [heatMode,setHeatMode]=React.useState(false);
  const G='rgba(215,183,64,';
  const B='rgba(35,137,224,';
  const W='rgba(255,255,255,';
  const O='rgba(249,115,22,';

  const loc=a.location;
  const isAttic=!loc||loc==='attic';
  const isCloset=loc==='closet';
  const isFD=loc==='furdown';
  const hasFurnace=a.indoor_type==='furnace';
  const hasCoil=!!a.indoor_type;
  const hasCond=!!a.cond_tier;
  const hasPlenum=!!a.plenum;  // true for ductboard, metal, AND none (existing)
  const hasTstat=a.thermostat&&a.thermostat!=='none';
  const hasUV=Array.isArray(a.purif)&&a.purif.includes('uv');
  const hasIonizer=Array.isArray(a.purif)&&a.purif.includes('ionizer');
  const hasAprilaire=Array.isArray(a.purif)&&a.purif.includes('aprilaire');
  const hasDehu=a.dehu==='yes';
  const isSurge=Array.isArray(a.extras)&&a.extras.includes('surge');
  const is90=a.furnace_eff==='e90';
  const isSpray=a.insulation==='spray';
  const isComm=a.stage==='comm';
  const is2=a.stage==='two';
  const systemFor=a.indoor_type==='ah'?'hp':(a.system_for||'sc');
  const isHP=systemFor==='hp'; // heat pump involved (AH always, furnace if hp selected)

  const furnaceActive=heatMode&&hasFurnace;          // furnace heats in heat mode
  const evapActive=!heatMode||!hasFurnace;            // coil always active for HP/AH; idle when furnace heats
  const condenserActive=hasCond&&(!heatMode||!hasFurnace); // cond idles only in gas heat mode
  const refReversed=heatMode&&!hasFurnace;            // HP reverses refrigerant in heat

  // Refrigerant colors — physically correct
  const evapC  = refReversed ? '#ef4444' : '#2389e0'; // evap: red=HP heat, blue=cool
  const evapC2 = refReversed ? '#fca5a5' : '#7dd3fc';
  const condC  = (!heatMode||hasFurnace) ? '#ef4444' : '#2389e0'; // cond: red=cool, blue=HP heat
  const condC2 = (!heatMode||hasFurnace) ? '#fca5a5' : '#7dd3fc';

  const TL={fedmin:'14.3 SEER2',mid_ge15:'15 SEER2',high_ge18:'18 SEER2',premium:'22+ SEER2'}[a.cond_tier]||'';
  const BL={fedmin:'AMERISTAR',mid_ge15:'GE CONNECT',high_ge18:'GE CONNECT',premium:'AM.STD'}[a.cond_tier]||'';

  // ── SUB-COMPONENTS ──────────────────────────────────────────

  function BlowerWheel({cx,cy,r,spd,active}){
    r=r||28; spd=spd||1; active=active!==false;
    const blades=Array.from({length:16},(_,i)=>{
      const ang=i*(360/16)*Math.PI/180;
      return <line key={i}
        x1={cx+r*0.36*Math.cos(ang)} y1={cy+r*0.36*Math.sin(ang)}
        x2={cx+r*0.88*Math.cos(ang+0.22)} y2={cy+r*0.88*Math.sin(ang+0.22)}
        stroke={active?(G+'.7)'):(G+'.2)')} strokeWidth="1.9" strokeLinecap="round"/>;
    });
    return <g>
      <circle cx={cx} cy={cy} r={r+4} fill="rgba(0,0,0,.5)" stroke={G+'.15)'} strokeWidth="0.8"/>
      <circle cx={cx} cy={cy} r={r} fill="#050505" stroke={G+'.3)'} strokeWidth="0.9"/>
      {active
        ?<g className="spin" style={{transformOrigin:cx+'px '+cy+'px',animationDuration:(1.0/spd)+'s'}}>{blades}</g>
        :<g>{blades}</g>}
      <circle cx={cx} cy={cy} r={r*0.27} fill="#090909" stroke={G+'.34)'} strokeWidth="0.9"/>
      <circle cx={cx} cy={cy} r={r*0.1} fill="#111" stroke={G+'.42)'} strokeWidth="0.6"/>
    </g>;
  }

  // UV rod — thin horizontal rod ~45px (9" at scale), UV purple glow
  function UVRod({x,y,len,vertical}){
    len=len||46;
    const x2=vertical?x:x+len, y2=vertical?y+len:y;
    return <g className="fadein">
      {/* Glow halo */}
      <line x1={x} y1={y} x2={x2} y2={y2}
        stroke="rgba(167,139,250,.4)" strokeWidth={vertical?8:8} strokeLinecap="round" filter="url(#glow-uv)"/>
      {/* Rod body */}
      <line x1={x} y1={y} x2={x2} y2={y2}
        stroke="rgba(196,181,253,.9)" strokeWidth={vertical?2.5:2.5} strokeLinecap="round"/>
      {/* End caps */}
      <circle cx={x} cy={y} r="3" fill="rgba(167,139,250,.8)" stroke="rgba(196,181,253,.6)" strokeWidth="0.8"/>
      <circle cx={x2} cy={y2} r="3" fill="rgba(167,139,250,.8)" stroke="rgba(196,181,253,.6)" strokeWidth="0.8"/>
      {/* Active glow pulse */}
      <line x1={x} y1={y} x2={x2} y2={y2}
        stroke="rgba(221,214,254,.5)" strokeWidth={vertical?1.5:1.5} strokeLinecap="round"
        className="glow-pulse"/>
    </g>;
  }

  // Ionizer — bulb sits OUTSIDE on top of plenum, rod penetrates DOWN into airstream
  // bulbX/bulbY = center of the bulb (outside, above plenum top)
  // rodLen = how far the rod extends down inside the plenum
  function Ionizer({bulbX, bulbY, rodLen}){
    rodLen=rodLen||55;
    const rodBot=bulbY+rodLen;
    return <g className="fadein">
      {/* Outer glow halo around bulb */}
      <circle cx={bulbX} cy={bulbY} r={14}
        fill="rgba(253,224,71,.08)" stroke="rgba(253,224,71,.2)" strokeWidth="0.6"
        filter="url(#glow-uv)"/>
      {/* Bulb body — larger, amber glass shape */}
      <ellipse cx={bulbX} cy={bulbY} rx={9} ry={11}
        fill="rgba(251,191,36,.18)" stroke="rgba(253,224,71,.75)" strokeWidth="1.5"/>
      {/* Bulb inner glow */}
      <ellipse cx={bulbX} cy={bulbY} rx={5.5} ry={7}
        fill="rgba(253,224,71,.35)" stroke="none" className="glow-pulse"/>
      {/* Filament / element inside bulb */}
      <line x1={bulbX-3} y1={bulbY-4} x2={bulbX+3} y2={bulbY+4}
        stroke="rgba(253,224,71,.9)" strokeWidth="1.2" strokeLinecap="round"/>
      <line x1={bulbX+3} y1={bulbY-4} x2={bulbX-3} y2={bulbY+4}
        stroke="rgba(253,224,71,.9)" strokeWidth="1.2" strokeLinecap="round"/>
      {/* Mounting collar / base where rod enters plenum */}
      <rect x={bulbX-4} y={bulbY+9} width={8} height={5} rx="1"
        fill="rgba(180,130,20,.5)" stroke="rgba(253,224,71,.5)" strokeWidth="0.8"/>
      {/* Rod going down into plenum */}
      {/* Glow halo behind rod */}
      <line x1={bulbX} y1={bulbY+14} x2={bulbX} y2={rodBot}
        stroke="rgba(253,224,71,.2)" strokeWidth={7} strokeLinecap="round" filter="url(#glow-uv)"/>
      {/* Rod body */}
      <line x1={bulbX} y1={bulbY+14} x2={bulbX} y2={rodBot}
        stroke="rgba(253,224,71,.82)" strokeWidth={2.2} strokeLinecap="round"/>
      {/* Plasma tip at rod end */}
      <circle cx={bulbX} cy={rodBot} r={3} fill="rgba(253,224,71,.9)" className="glow-pulse"/>
      <text x={bulbX+14} y={bulbY} textAnchor="start"
        fill="rgba(253,224,71,.48)" fontSize="5" fontFamily="monospace">IONIZER</text>
    </g>;
  }

  // A-coil > (peak RIGHT) — horizontal attic
  function ACoilH({x,y,w,h,active}){
    const peakX=x+w, peakY=y+h/2; const n=8;
    const tc=active?evapC:'rgba(48,48,78,.8)';
    return <g>
      <polygon points={`${x},${y} ${peakX},${peakY} ${peakX},${peakY+8} ${x},${y+12}`}
        fill={active?"rgba(4,10,28,.9)":"rgba(7,7,20,.9)"}
        stroke={active?(evapC+'88'):(G+'.22)')} strokeWidth="0.9"/>
      <polygon points={`${x},${y+h} ${peakX},${peakY} ${peakX},${peakY+8} ${x},${y+h-12}`}
        fill={active?"rgba(4,10,28,.9)":"rgba(7,7,20,.9)"}
        stroke={active?(evapC2+'80'):(G+'.18)')} strokeWidth="0.9"/>
      {Array.from({length:14},(_,i)=>(
        <line key={i} x1={x+4} y1={y+h*(i+0.5)/14} x2={x+w-8} y2={y+h*(i+0.5)/14}
          stroke={W+'.04)'} strokeWidth="0.4"/>
      ))}
      {Array.from({length:n},(_,i)=>{
        const t=(i+0.5)/n, tx=x+(peakX-x)*t+3, ty=y+(peakY-y)*t+3;
        return <g key={i}>
          <ellipse cx={tx} cy={ty} rx={4} ry={2} fill={active?(evapC+'22'):'rgba(14,14,34,.8)'} stroke={tc} strokeWidth="0.9" transform={`rotate(-22,${tx},${ty})`}/>
          {active&&<circle cx={tx} cy={ty} r={1.6} fill={evapC} opacity="0.7" className="glow-pulse" style={{animationDelay:i*0.1+'s'}}/>}
        </g>;
      })}
      {Array.from({length:n},(_,i)=>{
        const t=(i+0.5)/n, tx=x+(peakX-x)*t+3, ty=(y+h)+(peakY-(y+h))*t-3;
        return <g key={i}>
          <ellipse cx={tx} cy={ty} rx={4} ry={2} fill={active?(evapC2+'22'):'rgba(14,14,34,.8)'} stroke={active?evapC2:tc} strokeWidth="0.9" transform={`rotate(22,${tx},${ty})`}/>
          {active&&<circle cx={tx} cy={ty} r={1.6} fill={evapC2} opacity="0.7" className="glow-pulse" style={{animationDelay:(i+n)*0.1+'s'}}/>}
        </g>;
      })}
      <circle cx={peakX-5} cy={peakY+4} r={5.5} fill="#06061c" stroke={active?evapC:(G+'.3)')} strokeWidth="1.3"/>
      {active&&<circle cx={peakX-5} cy={peakY+4} r={2.5} fill={evapC} opacity="0.85" className="glow-pulse"/>}
      <rect x={x} y={y+h} width={w} height={6} rx="1" fill="#08121e" stroke={B+'.2)'} strokeWidth="0.7"/>
      {/* UV rod — centered exactly in the > coil:
          horizontal midline = y+h/2, depth center = x + w*0.45
          rod runs horizontal, length ~9" at scale (46px) */}
      {hasUV&&(()=>{
        const rodLen=Math.min(46, w*0.52);
        const rodCX=x+w*0.42;  // center x within the coil interior
        const rodCY=y+h/2;      // exact horizontal midline of the > shape
        return <UVRod x={rodCX-rodLen/2} y={rodCY} len={rodLen}/>;
      })()}
    </g>;
  }

  // A-coil ^ (peak UP) — upflow
  function ACoilV({x,y,w,h,active}){
    const peakX=x+w/2, peakY=y; const n=7;
    const tc=active?evapC:'rgba(48,48,78,.8)';
    return <g>
      <polygon points={`${x},${y+h} ${peakX},${peakY} ${peakX+8},${peakY} ${x+12},${y+h}`}
        fill={active?"rgba(4,10,28,.9)":"rgba(7,7,20,.9)"} stroke={active?(evapC+'88'):(G+'.22)')} strokeWidth="0.9"/>
      <polygon points={`${x+w},${y+h} ${peakX},${peakY} ${peakX+8},${peakY} ${x+w-12},${y+h}`}
        fill={active?"rgba(4,10,28,.9)":"rgba(7,7,20,.9)"} stroke={active?(evapC2+'80'):(G+'.18)')} strokeWidth="0.9"/>
      {Array.from({length:12},(_,i)=>(
        <line key={i} x1={x+w*(i+0.5)/12} y1={y+4} x2={x+w*(i+0.5)/12} y2={y+h-4} stroke={W+'.04)'} strokeWidth="0.4"/>
      ))}
      {Array.from({length:n},(_,i)=>{
        const t=(i+0.5)/n, tx=x+(peakX-x)*t+3, ty=(y+h)+(peakY-(y+h))*t+3;
        return <g key={i}>
          <ellipse cx={tx} cy={ty} rx={4} ry={2} fill={active?(evapC+'22'):'rgba(14,14,34,.8)'} stroke={tc} strokeWidth="0.9" transform={`rotate(${Math.atan2(peakY-(y+h),peakX-x)*180/Math.PI},${tx},${ty})`}/>
          {active&&<circle cx={tx} cy={ty} r={1.6} fill={evapC} opacity="0.7" className="glow-pulse" style={{animationDelay:i*0.11+'s'}}/>}
        </g>;
      })}
      {Array.from({length:n},(_,i)=>{
        const t=(i+0.5)/n, tx=(x+w)+(peakX-(x+w))*t-3, ty=(y+h)+(peakY-(y+h))*t+3;
        return <g key={i}>
          <ellipse cx={tx} cy={ty} rx={4} ry={2} fill={active?(evapC2+'22'):'rgba(14,14,34,.8)'} stroke={active?evapC2:tc} strokeWidth="0.9" transform={`rotate(${Math.atan2(peakY-(y+h),peakX-(x+w))*180/Math.PI},${tx},${ty})`}/>
          {active&&<circle cx={tx} cy={ty} r={1.6} fill={evapC2} opacity="0.7" className="glow-pulse" style={{animationDelay:(i+n)*0.11+'s'}}/>}
        </g>;
      })}
      <circle cx={peakX+4} cy={peakY+6} r={5.5} fill="#06061c" stroke={active?evapC:(G+'.3)')} strokeWidth="1.3"/>
      {active&&<circle cx={peakX+4} cy={peakY+6} r={2.5} fill={evapC} opacity="0.85" className="glow-pulse"/>}
      <rect x={x} y={y+h} width={w} height={6} rx="1" fill="#08121e" stroke={B+'.2)'} strokeWidth="0.7"/>
      {/* UV rod — centered in the ^ A-coil triangle:
          Triangle centroid is at (x+w/2, y + h*2/3) — that's the geometric center.
          Rod runs vertical through the centroid, ~9" at scale (46px) */}
      {hasUV&&(()=>{
        const rodLen=Math.min(46, h*0.42);
        const rodCX=x+w*0.5;     // horizontal center of the A-frame
        const rodCY=y+h*2/3;     // vertical centroid of the triangle
        return <UVRod x={rodCX} y={rodCY-rodLen/2} len={rodLen} vertical={true}/>;
      })()}
      <rect x={peakX-16} y={y+h+6} width={8} height={12} rx="1.5" fill={active?(evapC+'2a'):'rgba(22,22,44,.7)'} stroke={evapC} strokeWidth="0.9"/>
      <rect x={peakX+8} y={y+h+6} width={8} height={12} rx="1.5" fill={active?(evapC2+'2a'):'rgba(22,22,44,.7)'} stroke={evapC2} strokeWidth="0.9"/>
    </g>;
  }

  // Furnace horizontal — blower LEFT | HX RIGHT
  function FurnaceH({x,y,w,h,active}){
    const mid=x+w/2;
    return <g>
      <rect x={x} y={y} width={w} height={h} rx="4"
        fill={active?"#0d0606":"#0a0a0a"}
        stroke={active?'rgba(249,115,22,.84)':(G+'.64)')} strokeWidth={active?2.2:1.8}/>
      {active&&<rect x={x} y={y} width={w} height={h} rx="4" fill={O+'.04)'} stroke="none"/>}
      <rect x={x} y={y} width={w} height={9} rx="4" fill={active?"url(#orange-g)":"url(#gold)"} opacity=".72"/>
      <line x1={mid} y1={y+9} x2={mid} y2={y+h} stroke={G+'.2)'} strokeWidth="1" strokeDasharray="4 3"/>
      {Array.from({length:7},(_,i)=>(
        <line key={i} x1={x+3} y1={y+12+i*(h-18)/7} x2={x+3} y2={y+18+i*(h-18)/7}
          stroke={G+'.36)'} strokeWidth="3" strokeLinecap="round"/>
      ))}
      <BlowerWheel cx={x+w*0.25} cy={y+h/2+2} r={Math.min(w*0.21,h*0.36)}
        spd={active?1.6:0.5} active={active||!heatMode}/>
      <text x={x+w*0.25} y={y+h-4} textAnchor="middle" fill={G+'.3)'} fontSize="5.5" fontFamily="monospace">BLOWER</text>
      {Array.from({length:6},(_,i)=>{
        const gy=y+10+i*(h-18)/6;
        return <path key={i}
          d={`M${mid+6} ${gy+6} Q${mid+w*0.17} ${gy-2} ${mid+w*0.31} ${gy+7} Q${mid+w*0.41} ${gy+14} ${mid+w*0.31} ${gy+18}`}
          fill="none" stroke={active?'rgba(249,115,22,.6)':'rgba(108,44,8,.22)'} strokeWidth="2.8" strokeLinecap="round"/>;
      })}
      <rect x={mid+4} y={y+h-17} width={w/2-8} height={10} rx="2"
        fill={active?O+'.07)':'rgba(5,5,13,.8)'} stroke={active?'rgba(249,115,22,.42)':(G+'.14)')} strokeWidth="0.6"/>
      {Array.from({length:4},(_,i)=>{
        const bx=mid+6+i*(w/2-12)/4, bw2=(w/2-14)/4;
        return <g key={i}>
          <rect x={bx} y={y+h-16} width={bw2} height={8} rx="1"
            fill={active?"#100505":"#09090f"} stroke={active?'rgba(249,115,22,.36)':'rgba(48,20,5,.2)'} strokeWidth="0.5"/>
          {active&&<>
            <ellipse cx={bx+bw2/2} cy={y+h-16} rx={bw2/2} ry={4.5} fill={O+'.56)'} className="glow-pulse" style={{animationDelay:i*0.12+'s'}}/>
            <ellipse cx={bx+bw2/2} cy={y+h-18} rx={bw2/3} ry={3.5} fill="rgba(253,224,71,.64)" className="glow-pulse" style={{animationDelay:i*0.12+0.07+'s'}}/>
          </>}
        </g>;
      })}
      <text x={mid+w*0.25} y={y+h-4} textAnchor="middle" fill={active?'rgba(249,115,22,.44)':(G+'.28)')} fontSize="5.5" fontFamily="monospace">HEAT EXCH.</text>
      {/* Flue — straight up from HX section through the roof */}
      {(()=>{
        const fx=mid+w*0.22;
        const pipeW=is90?6:9;
        const pipeC=is90?"#bfdbfe":"#d0d0d0";
        const pipeS=is90?"#93c5fd":"#b0b0b0";
        const pipeTop=Math.min(y-80, -10); // goes all the way through roofline
        return <>
          <rect x={fx-pipeW/2} y={pipeTop} width={pipeW} height={y-pipeTop} rx="1"
            fill={pipeC} stroke={pipeS} strokeWidth="1"/>
          {is90
            ?<rect x={fx-pipeW-1} y={pipeTop-4} width={pipeW*2+2} height={5} rx="1"
                fill={pipeC} stroke={pipeS} strokeWidth="0.8"/>
            :<path d={`M${fx-pipeW*1.4} ${pipeTop+2} L${fx} ${pipeTop-6} L${fx+pipeW*1.4} ${pipeTop+2}`}
                fill={pipeC}/>}
          <text x={fx+pipeW+5} y={pipeTop+20} textAnchor="start"
            fill={is90?"rgba(147,197,253,.55)":"rgba(185,185,185,.5)"}
            fontSize="6.5" fontFamily="monospace">{is90?'PVC FLUE':'B-VENT'}</text>
        </>;
      })()}
      <rect x={x+4} y={y+11} width={isComm?62:is2?52:44} height="8" rx="2" fill={isComm?"url(#blue)":(G+'.1)')}/>
      <text x={x+7} y={y+18} fill={isComm?"#fff":(G+'.78)')} fontSize="5.5" fontFamily="monospace">{isComm?'COMMUNICATING':is2?'2-STAGE':'1-STAGE'}</text>
      <rect x={mid+4} y={y+11} width={36} height="8" rx="2" fill={is90?"rgba(35,137,224,.13)":(G+'.07)')} stroke={is90?(B+'.24)'):(G+'.16)')} strokeWidth="0.5"/>
      <text x={mid+22} y={y+18} textAnchor="middle" fill={is90?"#5ba8f5":(G+'.6)')} fontSize="5.5" fontFamily="monospace">{is90?'90%':'80%'} AFUE</text>
    </g>;
  }

  // Air handler horizontal — blower LEFT | A-coil RIGHT
  function AirHandlerH({x,y,w,h,active}){
    const mid=x+w/2;
    return <g>
      <rect x={x} y={y} width={w} height={h} rx="4"
        fill={active?"#050c1a":"#090909"}
        stroke={active?(evapC+'90'):(G+'.48)')} strokeWidth={active?1.9:1.5}/>
      {active&&<rect x={x} y={y} width={w} height={h} rx="4" fill={refReversed?O+'.03)':'rgba(35,137,224,.03)'} stroke="none"/>}
      <rect x={x} y={y} width={w} height={9} rx="4" fill={active?(refReversed?"url(#orange-g)":"url(#blue)"):"url(#gold)"} opacity=".68"/>
      <line x1={mid} y1={y+9} x2={mid} y2={y+h} stroke={G+'.18)'} strokeWidth="0.9" strokeDasharray="4 3"/>
      {Array.from({length:7},(_,i)=>(
        <line key={i} x1={x+3} y1={y+12+i*(h-18)/7} x2={x+3} y2={y+18+i*(h-18)/7}
          stroke={G+'.32)'} strokeWidth="3" strokeLinecap="round"/>
      ))}
      <BlowerWheel cx={x+w*0.25} cy={y+h/2+2} r={Math.min(w*0.21,h*0.36)}
        spd={active?1.5:0.45} active={active||!heatMode}/>
      <text x={x+w*0.25} y={y+h-4} textAnchor="middle" fill={G+'.28)'} fontSize="5.5" fontFamily="monospace">BLOWER</text>
      <rect x={mid+2} y={y+8} width={w/2-6} height={h-14} rx="2" fill={active?"rgba(4,8,22,.7)":"rgba(6,6,16,.7)"}/>
      <ACoilH x={mid+8} y={y+12} w={w/2-18} h={h-22} active={active}/>
      <text x={mid+w/4} y={y+h-4} textAnchor="middle" fill={active?evapC:(G+'.28)')} fontSize="5.5" fontFamily="monospace">A-COIL</text>
      <rect x={x} y={y+h} width={w} height={6} rx="1" fill="#08121e" stroke={B+'.18)'} strokeWidth="0.7"/>
      {isComm&&<><rect x={mid+4} y={y+11} width={62} height="8" rx="2" fill="url(#blue)"/>
      <text x={mid+7} y={y+18} fill="#fff" fontSize="5.5" fontFamily="monospace">COMMUNICATING</text></>}
    </g>;
  }

  // Condenser
  // Condenser — real-world proportioned by tier
  // Fed min: ~30"W × 37"H — square/boxy, fan covers 90% of top
  // Mid (GE Connect): mini-split style — horizontal rectangle, inverter label
  // High/Premium: ~36"W × 50"H — larger square, big fan, more imposing
  // Scale: ~3.2px per inch
  function Condenser({x,y,w,h,active,tierKey}){
    const isMini=tierKey==='mid_ge15';
    const isBig=tierKey==='high_ge18'||tierKey==='premium';
    const cc=active?condC:'rgba(55,18,18,.5)';

    // Fan takes 90% of the TOP face for fed min, 85% for big units
    const fanTopPct=tierKey==='fedmin'?0.82:isBig?0.78:0.5;
    const fanSectionH=Math.round(h*fanTopPct);
    const coilSectionH=h-fanSectionH;
    const fanR=Math.round(Math.min(w,fanSectionH)*0.42);
    const fanCX=x+w/2;
    const fanCY=y+fanSectionH/2+4;

    return <g>
      <rect x={x} y={y} width={w} height={h} rx={isMini?10:4}
        fill={active?"#090808":"#080808"}
        stroke={active?cc:(G+'.42)')} strokeWidth={active?2:1.5}/>
      {active&&<rect x={x} y={y} width={w} height={h} rx={isMini?10:4}
        fill={condenserActive&&!refReversed?"rgba(239,68,68,.025)":"rgba(35,137,224,.018)"} stroke="none"/>}

      {isMini
        /* ── MINI-SPLIT STYLE ── */
        ?<>
          {/* Top fan section */}
          <rect x={x+3} y={y+3} width={w-6} height={fanSectionH-3} rx="8"
            fill="rgba(0,0,0,.4)" stroke={G+'.1)'} strokeWidth="0.5"/>
          <BlowerWheel cx={fanCX} cy={fanCY} r={fanR} spd={active?1.1:0.3} active={active}/>
          {/* Top grille ring */}
          <circle cx={fanCX} cy={fanCY} r={fanR+6}
            fill="none" stroke={G+'.18)'} strokeWidth="1"/>
          {/* Bottom coil/louvre section */}
          <rect x={x} y={y+fanSectionH} width={w} height={coilSectionH} rx="0"
            fill="rgba(0,0,0,.2)" stroke="none"/>
          {Array.from({length:Math.floor(coilSectionH/6)},(_,i)=>(
            <rect key={i} x={x+3} y={y+fanSectionH+2+i*6} width={w-6} height={3} rx="0.5"
              fill={active?(cc+'14'):'rgba(10,10,20,.8)'} stroke={active?cc:(G+'.12)')} strokeWidth="0.5"/>
          ))}
          {/* Inverter + GE badge */}
          <rect x={x+4} y={y+h-18} width={w-8} height={13} rx="2"
            fill="rgba(35,137,224,.2)" stroke={B+'.45)'} strokeWidth="0.8"/>
          <text x={x+w/2} y={y+h-9} textAnchor="middle"
            fill="#5ba8f5" fontSize="6" fontFamily="monospace">GE CONNECT · INVERTER</text>
        </>
        /* ── STANDARD CONDENSER (fed min / high / premium) ── */
        :<>
          {/* TOP: Fan section — takes most of unit height */}
          <rect x={x+3} y={y+3} width={w-6} height={fanSectionH-3} rx="3"
            fill="rgba(0,0,0,.35)" stroke={G+'.08)'} strokeWidth="0.5"/>
          {/* Fan grille ring */}
          <circle cx={fanCX} cy={fanCY} r={fanR+5}
            fill="none" stroke={G+'.18)'} strokeWidth="1.2"/>
          <circle cx={fanCX} cy={fanCY} r={fanR+3}
            fill="none" stroke={G+'.1)'} strokeWidth="0.6"/>
          <BlowerWheel cx={fanCX} cy={fanCY} r={fanR} spd={active?1.0:0.3} active={active}/>

          {/* BOTTOM: Coil tubes section */}
          {Array.from({length:Math.floor((coilSectionH-6)/6)},(_,i)=>{
            const n=Math.floor((coilSectionH-6)/6);
            if(i>=n) return null;
            return <g key={i}>
              <rect x={x+3} y={y+fanSectionH+2+i*6} width={w-6} height={3.5} rx="0.5"
                fill={active?(cc+'16'):'rgba(10,10,22,.8)'}
                stroke={active?cc:(G+'.14)')} strokeWidth="0.6"/>
              {active&&i%2===0&&<circle cx={x+w*0.35} cy={y+fanSectionH+3.5+i*6} r={1.8}
                fill={cc} opacity="0.45" className="glow-pulse"
                style={{animationDelay:i*0.08+'s'}}/>}
            </g>;
          })}

          {/* Compressor dome — bottom right corner */}
          <circle cx={x+w-14} cy={y+h-14} r={isBig?14:10}
            fill="#070707" stroke={active?cc:(G+'.32)')} strokeWidth="1.2"/>
          <circle cx={x+w-14} cy={y+h-14} r={isBig?9:6}
            fill="#040404" stroke={G+'.18)'} strokeWidth="0.7"/>
          {active&&<circle cx={x+w-14} cy={y+h-14} r={isBig?4:3}
            fill={cc+'66'} className="glow-pulse"/>}
          <text x={x+w-14} y={y+h-1} textAnchor="middle"
            fill={active?cc:(G+'.24)')} fontSize="5" fontFamily="monospace">COMP</text>
        </>
      }

      {/* SEER badge bottom */}
      <rect x={x+3} y={y+h-12} width={w-6} height={9} rx="2"
        fill={active?(refReversed?"url(#blue)":"url(#red-g)"):"url(#gold)"} opacity=".55"/>
      <text x={x+w/2} y={y+h-5} textAnchor="middle"
        fill="#fff" fontSize="5" fontFamily="monospace" fontWeight="700">{TL}</text>
    </g>;
  }

  // Exterior outside zone — side view of wall + condenser on pad
  // wallX = x position of the wall face
  // condenser = {x,y,w,h,tierKey}
  // Shows: wall cross-section, line-set penetration, disconnect, surge, pad, condenser
  function OutsideZone({wallX, zoneW, zoneH, condX, condY, condW, condH, lineY1, lineY2, tierKey, active}){
    const groundY=zoneH-28;
    const padY=groundY-10;
    const wallThick=18;   // visible wall cross-section width
    const sidingX=wallX;  // outside face of wall

    return <g>
      {/* ── GROUND ── */}
      <rect x={wallX} y={groundY} width={zoneW} height={zoneH-groundY} fill="#0c0b08" stroke="none"/>
      {Array.from({length:10},(_,i)=>(
        <line key={i} x1={wallX+i*(zoneW/10)} y1={groundY} x2={wallX+i*(zoneW/10)+10} y2={groundY+8}
          stroke="rgba(90,80,45,.2)" strokeWidth="0.7"/>
      ))}
      <text x={wallX+zoneW/2} y={groundY+18} textAnchor="middle"
        fill="rgba(110,95,55,.45)" fontSize="5.5" fontFamily="monospace">GROUND LEVEL</text>

      {/* ── CONCRETE PAD — under condenser ── */}
      <rect x={condX-10} y={padY} width={condW+20} height={14} rx="2"
        fill="rgba(165,160,148,.22)" stroke="rgba(190,185,168,.28)" strokeWidth="1"/>
      {Array.from({length:5},(_,i)=>(
        <line key={i} x1={condX+i*(condW+20)/5-10} y1={padY+2}
          x2={condX+i*(condW+20)/5-10} y2={padY+12}
          stroke="rgba(190,185,168,.1)" strokeWidth="0.5"/>
      ))}
      <text x={condX+condW/2} y={padY+10} textAnchor="middle"
        fill="rgba(170,160,140,.4)" fontSize="4.5" fontFamily="monospace">CONCRETE PAD</text>

      {/* ── WALL CROSS-SECTION ── proper side view of exterior wall */}
      {/* Wall body */}
      <rect x={sidingX} y={0} width={wallThick} height={groundY}
        fill="#111318" stroke="rgba(90,90,110,.25)" strokeWidth="0.8"/>
      {/* Siding horizontal courses */}
      {Array.from({length:Math.floor(groundY/10)},(_,i)=>(
        <rect key={i} x={sidingX} y={i*10} width={wallThick} height={9}
          fill={i%2===0?"rgba(22,22,28,.8)":"rgba(18,18,24,.8)"}
          stroke="rgba(80,80,100,.12)" strokeWidth="0.3"/>
      ))}
      {/* Wall face highlight */}
      <line x1={sidingX+wallThick} y1={0} x2={sidingX+wallThick} y2={groundY}
        stroke="rgba(180,175,160,.1)" strokeWidth="1"/>
      {/* Inside wall face */}
      <line x1={sidingX} y1={0} x2={sidingX} y2={groundY}
        stroke="rgba(180,175,160,.08)" strokeWidth="0.5"/>

      {/* ── LINE-SET — exits wall, drops to condenser bottom ── */}
      {/* Wall sleeve / penetration */}
      <rect x={sidingX+1} y={lineY1-6} width={wallThick-2} height={lineY2-lineY1+12} rx="2"
        fill="rgba(120,85,30,.25)" stroke="rgba(150,110,40,.35)" strokeWidth="0.8"/>
      <text x={sidingX+wallThick/2} y={lineY2+16} textAnchor="middle"
        fill="rgba(150,110,40,.5)" fontSize="5" fontFamily="monospace">LINESET</text>
      {/* Foam sleeve on pipes — from wall to condenser */}
      <path d={`M${sidingX+wallThick} ${lineY1} L${condX+condW*0.35} ${lineY1} L${condX+condW*0.35} ${condY+condH}`}
        fill="none" stroke="rgba(30,30,50,.65)" strokeWidth="11" strokeLinecap="round" strokeLinejoin="round"/>
      {/* Liquid line */}
      <path d={`M${sidingX+wallThick} ${lineY1} L${condX+condW*0.35} ${lineY1} L${condX+condW*0.35} ${condY+condH}`}
        fill="none" stroke={active?evapC:'rgba(28,28,48,.55)'} strokeWidth="3.5"
        strokeLinecap="round" strokeLinejoin="round" className="draw"/>
      {/* Suction line (offset) */}
      <path d={`M${sidingX+wallThick} ${lineY2} L${condX+condW*0.42} ${lineY2} L${condX+condW*0.42} ${condY+condH}`}
        fill="none" stroke={active?evapC2:'rgba(28,28,48,.45)'} strokeWidth="3.5"
        strokeLinecap="round" strokeLinejoin="round" className="draw" style={{animationDelay:'.1s'}}/>
      {/* Animated flow dots */}
      {active&&Array.from({length:3},(_,i)=>(
        <circle key={i} r="3.5" fill={i%2===0?evapC:evapC2} opacity="0.72" filter="url(#glow-sm)">
          <animateMotion dur={(2.0+i*0.4)+'s'} repeatCount="indefinite" begin={i*0.65+'s'}
            path={refReversed
              ?`M${condX+condW*0.35} ${condY+condH} L${condX+condW*0.35} ${lineY1} L${sidingX+wallThick} ${lineY1}`
              :`M${sidingX+wallThick} ${lineY1} L${condX+condW*0.35} ${lineY1} L${condX+condW*0.35} ${condY+condH}`}/>
        </circle>
      ))}

      {/* ── DISCONNECT BOX — prominent, on outside wall face ── */}
      {(()=>{
        const DX=sidingX+wallThick+4;
        const DY=condY+Math.round(condH*0.12);
        const DW=44, DH=68;   // significantly bigger
        return <>
          {/* Box body */}
          <rect x={DX} y={DY} width={DW} height={DH} rx="4"
            fill="#0c0d10" stroke={G+'.65)'} strokeWidth="2"/>
          {/* Inner inset shadow */}
          <rect x={DX+2} y={DY+2} width={DW-4} height={DH-4} rx="3"
            fill="none" stroke="rgba(0,0,0,.6)" strokeWidth="1"/>
          {/* Label plate */}
          <rect x={DX+3} y={DY+4} width={DW-6} height={14} rx="2"
            fill={G+'.14)'} stroke={G+'.32)'} strokeWidth="0.8"/>
          <text x={DX+DW/2} y={DY+14} textAnchor="middle"
            fill={G+'.82)'} fontSize="7" fontFamily="monospace" fontWeight="700">DISC.</text>
          {/* Switch housing */}
          <rect x={DX+5} y={DY+22} width={DW-10} height={32} rx="3"
            fill={active?"rgba(239,68,68,.18)":"rgba(35,38,62,.75)"}
            stroke={active?condC:(G+'.32)')} strokeWidth="1.1"/>
          {/* Handle lever */}
          <rect x={DX+11} y={DY+26} width={DW-22} height={20} rx="2.5"
            fill={active?"rgba(239,68,68,.55)":"rgba(55,58,90,.7)"}
            stroke={active?condC:(G+'.24)')} strokeWidth="1"/>
          {/* Handle center line */}
          <line x1={DX+DW/2} y1={DY+28} x2={DX+DW/2} y2={DY+44}
            stroke={active?condC:(G+'.18)')} strokeWidth="1" strokeDasharray="2 2"/>
          {/* Status dot */}
          <circle cx={DX+DW/2} cy={DY+57} r="5"
            fill={active?"rgba(34,197,94,.6)":"rgba(50,50,80,.6)"}
            stroke={active?"#22c55e":(G+'.2)')} strokeWidth="1"/>
          {active&&<circle cx={DX+DW/2} cy={DY+57} r="2.5"
            fill="#22c55e" className="glow-pulse"/>}
          {/* Conduit to unit */}
          <line x1={DX+DW} y1={DY+DH/2} x2={condX} y2={DY+DH/2}
            stroke="rgba(22,22,42,.7)" strokeWidth="8" strokeLinecap="round"/>
          <line x1={DX+DW} y1={DY+DH/2} x2={condX} y2={DY+DH/2}
            stroke={G+'.48)'} strokeWidth="4" strokeLinecap="round"/>
          {/* Surge protector — bigger, below disconnect */}
          {isSurge&&<g className="fadein">
            <rect x={DX} y={DY+DH+6} width={DW} height={52} rx="4"
              fill="#160700" stroke="#f97316" strokeWidth="1.8"/>
            <rect x={DX+2} y={DY+DH+8} width={DW-4} height={DH-4} rx="3"
              fill="none" stroke="rgba(249,115,22,.15)" strokeWidth="0.7"/>
            {/* Label */}
            <rect x={DX+4} y={DY+DH+10} width={DW-8} height={13} rx="2"
              fill="rgba(249,115,22,.12)" stroke="#f97316" strokeWidth="0.7"/>
            <text x={DX+DW/2} y={DY+DH+20} textAnchor="middle"
              fill="#f97316" fontSize="7" fontFamily="monospace" fontWeight="700">SURGE</text>
            {/* Lightning bolt */}
            <text x={DX+DW/2} y={DY+DH+40} textAnchor="middle"
              fill="#f97316" fontSize="18">⚡</text>
            <text x={DX+DW/2} y={DY+DH+54} textAnchor="middle"
              fill="rgba(249,115,22,.6)" fontSize="5.5" fontFamily="monospace">PROTECTOR</text>
          </g>}
        </>;
      })()}

      {/* ── CONDENSER UNIT ── */}
      <Condenser x={condX} y={condY} w={condW} h={condH}
        active={active} tierKey={tierKey}/>
      <text x={condX+condW/2} y={condY-9} textAnchor="middle"
        fill={active?condC:(G+'.3)')} fontSize="7" fontFamily="monospace">
        CONDENSER {active?"· ACTIVE":"· STANDBY"}
      </text>

      {/* OUTSIDE label */}
      <text x={wallX+zoneW/2} y={12} textAnchor="middle"
        fill={W+'.07)'} fontSize="6" fontFamily="monospace" letterSpacing="1.2">OUTSIDE</text>
    </g>;
  }

  // Condensate pump — small box below evap coil
  function CondensatePump({x,y,w}){
    return <g className="fadein">
      <rect x={x+w*0.28} y={y} width={w*0.44} height={16} rx="2"
        fill="rgba(35,137,224,.1)" stroke={B+'.48)'} strokeWidth="1.1"/>
      <text x={x+w/2} y={y+10} textAnchor="middle"
        fill={B+'.72)'} fontSize="5.5" fontFamily="monospace">COND. PUMP</text>
      <line x1={x+w/2} y1={y+16} x2={x+w/2} y2={y+28}
        stroke={B+'.3)'} strokeWidth="1.2" strokeDasharray="3 2"/>
    </g>;
  }

  const Defs=()=><defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#f0d64e"/><stop offset="100%" stopColor="#ab8024"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#1a6cb5"/><stop offset="100%" stopColor="#2389e0"/></linearGradient>
    <linearGradient id="red-g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#b91c1c"/><stop offset="100%" stopColor="#ef4444"/></linearGradient>
    <linearGradient id="orange-g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stopColor="#ea580c"/><stop offset="100%" stopColor="#f97316"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-sm"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-uv"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" floodColor="rgba(0,0,0,.55)"/></filter>
    <marker id="arr" viewBox="0 0 8 8" refX="6" refY="4" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M1 1L6 4L1 7" fill="none" stroke="context-stroke" strokeWidth="1.5"/>
    </marker>
  </defs>;

  const ToggleUI=({style})=>(
    <div style={{display:'flex',background:'#0c0c0c',border:'1px solid rgba(215,183,64,.22)',overflow:'hidden',...style}}>
      <button onClick={()=>setHeatMode(false)} style={{
        padding:'5px 13px',border:'none',cursor:'pointer',fontFamily:'monospace',fontSize:'9px',letterSpacing:'.1em',
        background:!heatMode?'rgba(35,137,224,.18)':'transparent',color:!heatMode?'#5ba8f5':'rgba(255,255,255,.26)',outline:'none',transition:'all .2s'}}>❄ COOL</button>
      <button onClick={()=>setHeatMode(true)} style={{
        padding:'5px 13px',border:'none',cursor:'pointer',fontFamily:'monospace',fontSize:'9px',letterSpacing:'.1em',
        background:heatMode?'rgba(249,115,22,.18)':'transparent',color:heatMode?'#f97316':'rgba(255,255,255,.26)',outline:'none',transition:'all .2s'}}>🔥 HEAT</button>
    </div>
  );

  // ══════════════════════════════════════════════════════════
  // ATTIC HORIZONTAL
  // Before condenser: system fills full canvas, large + centered.
  // After condenser: house = 2/3, outside wall + condenser = 1/3.
  // Condenser: true side-wall view, lineset exits wall at condenser bottom.
  // ══════════════════════════════════════════════════════════
  if(isAttic){
    const VW=960, VH=580;

    // 2/3 house when condenser selected, full width otherwise
    const HOUSE_W=hasCond ? Math.round(VW*(2/3)) : VW-8;
    const OUTSIDE_W=hasCond ? VW-HOUSE_W : 0;

    // Shallow pitch
    const RIDGE_RISE=Math.round(Math.min(HOUSE_W/2*(3/12),68));
    const EAVE_Y=RIDGE_RISE+14;
    const RIDGE_Y=12;
    const RIDGE_X=HOUSE_W/2;

    const DECK_Y=VH-120;
    const ATTIC_H=DECK_Y-EAVE_Y;

    // Match upflow scale (6.2px/inch @ 20" wide = 124px)
    const SCALE_PX=6.2;
    const UNIT_H=Math.round(15*SCALE_PX*1.13); // ~105px — 13% thicker
    const UNIT_Y=EAVE_Y+Math.round((ATTIC_H-UNIT_H)/2)+4;

    const RET_PLEN_W=72;          // bigger — was 52
    const APR_W=hasAprilaire?32:0; // bigger — was 20
    // Scale furnace/AH wider when no condenser
    const SCALE=hasCond?1:1.18;
    const FURN_W=hasFurnace?Math.round(196*SCALE):0;
    const ACOIL_W=hasFurnace?Math.round(108*SCALE):0;
    const AH_W=!hasFurnace?Math.round(296*SCALE):0;
    const SUP_PLEN_W=hasPlenum&&a.plenum!=='none'?160:a.plenum==='none'?100:0;
    const SUP_PLEN_H=UNIT_H;

    // Center system in house zone when no condenser
    const totalW=RET_PLEN_W+(APR_W?APR_W+2:0)+FURN_W+(hasFurnace?ACOIL_W+4:AH_W)+SUP_PLEN_W;
    const MARGIN_L=hasCond?30:Math.max(20,Math.round((HOUSE_W-totalW)/2));
    const RET_X=MARGIN_L;
    const APR_X=RET_X+RET_PLEN_W+(APR_W?2:0);
    const UNIT_X=APR_X+APR_W+(APR_W?2:0);
    const FURN_X=UNIT_X;
    const ACOIL_X=FURN_X+FURN_W+(hasFurnace?4:0);
    const AH_X=UNIT_X;
    const unitRightEdge=hasFurnace?ACOIL_X+ACOIL_W:AH_X+AH_W;
    const SUP_X=unitRightEdge+4;
    const SUP_PLEN_Y=UNIT_Y;

    // LINE-SET exits LEFT face of the coil section:
    // For furnace: left face of A-coil (closest to HX side)
    // For AH: left edge of A-coil section (right half of AH, so x = AH_X + AH_W/2)
    const RL_START_X=hasFurnace ? ACOIL_X+4 : AH_X+Math.round(AH_W/2)+4;
    const RL_ROOF_Y=EAVE_Y+14;

    // Real-world condenser sizes @ 3.2px/inch
    // Outside zone is 1/3 of VW. Condenser takes up majority of that zone.
    const PX_C=3.2;
    const COND_SIZES={
      fedmin:   {w:Math.round(24*PX_C), h:Math.round(30*PX_C)},
      mid_ge15: {w:Math.round(36*PX_C), h:Math.round(22*PX_C)},
      high_ge18:{w:Math.round(36*PX_C), h:Math.round(50*PX_C)},
    };
    const CS=COND_SIZES[a.cond_tier]||COND_SIZES.fedmin;
    // Scale condenser up to fill ~70% of the outside zone width
    const ZONE_COND_W=Math.round(OUTSIDE_W*0.72);
    const COND_SCALE=ZONE_COND_W/CS.w;
    const COND_W=Math.round(CS.w*COND_SCALE);
    const COND_H=Math.round(CS.h*COND_SCALE);
    const EXT_WALL_X=HOUSE_W;
    const WALL_THICK=18;
    const DISC_ZONE=52;  // space for disconnect on wall face
    const COND_X=EXT_WALL_X+WALL_THICK+DISC_ZONE+8;
    const COND_Y=DECK_Y-COND_H-8;
    // Lineset exits wall at bottom 1/3 of condenser — enters condenser bottom
    const LS_Y1=COND_Y+Math.round(COND_H*0.72);
    const LS_Y2=COND_Y+Math.round(COND_H*0.82);

    return(
      <div style={{position:'relative',width:'100%'}}>
        {hasCoil&&<ToggleUI style={{position:'absolute',top:8,right:8,zIndex:10}}/>}
        <svg viewBox={`0 0 ${VW} ${VH}`} className="canvas-svg">
          <Defs/>

          {/* Full canvas background */}
          <rect x="0" y="0" width={VW} height={VH} fill="#040404"/>

          {/* Outside zone (right of wall) — darker, sky-like */}
          {hasCond&&<rect x={EXT_WALL_X} y="0" width={OUTSIDE_W} height={VH} fill="#030305"/>}

          {/* Attic interior (above deck, inside house) */}
          <rect x="0" y={EAVE_Y} width={HOUSE_W} height={DECK_Y-EAVE_Y} fill="#060608"/>

          {/* Living space below deck */}
          <rect x="0" y={DECK_Y} width={HOUSE_W} height={VH-DECK_Y} fill="#030305"/>

          {/* ── LOW-PITCH ROOF — shallow, full house width ── */}
          {/* Left slope: eave (left edge) → ridge */}
          <line x1="0" y1={EAVE_Y} x2={RIDGE_X} y2={RIDGE_Y}
            stroke="rgba(130,124,106,.38)" strokeWidth="2.8"/>
          {/* Right slope: ridge → eave (right edge of house) */}
          <line x1={RIDGE_X} y1={RIDGE_Y} x2={HOUSE_W} y2={EAVE_Y}
            stroke="rgba(130,124,106,.38)" strokeWidth="2.8"/>
          {/* Ridge cap */}
          <rect x={RIDGE_X-5} y={RIDGE_Y-2} width="10" height="7" rx="2" fill="rgba(160,155,135,.18)"/>
          {/* Roof deck fill (very subtle) */}
          <polygon points={`0,${EAVE_Y} ${RIDGE_X},${RIDGE_Y} ${HOUSE_W},${EAVE_Y}`}
            fill="rgba(10,10,16,.6)" stroke="none"/>
          {/* Fascia line at eave */}
          <line x1="0" y1={EAVE_Y} x2={HOUSE_W} y2={EAVE_Y}
            stroke="rgba(180,170,145,.18)" strokeWidth="3"/>

          {/* ── INSULATION — only shown after selection ── */}
          {a.insulation&&(isSpray
            ?<g>
              {Array.from({length:20},(_,i)=>{
                const t=i/19, sx=t*RIDGE_X, sy=EAVE_Y-(EAVE_Y-RIDGE_Y)*t;
                const ang=-Math.atan2(EAVE_Y-RIDGE_Y,RIDGE_X)*180/Math.PI;
                return <ellipse key={'ls'+i} cx={sx+8} cy={sy+8} rx={16} ry={8}
                  fill="rgba(234,238,246,.16)" stroke="rgba(234,238,246,.22)" strokeWidth=".5"
                  transform={`rotate(${ang},${sx+8},${sy+8})`}/>;
              })}
              {Array.from({length:20},(_,i)=>{
                const t=i/19, sx=RIDGE_X+t*(HOUSE_W-RIDGE_X), sy=RIDGE_Y+(EAVE_Y-RIDGE_Y)*t;
                const ang=Math.atan2(EAVE_Y-RIDGE_Y,HOUSE_W-RIDGE_X)*180/Math.PI;
                return <ellipse key={'rs'+i} cx={sx} cy={sy+7} rx={16} ry={8}
                  fill="rgba(234,238,246,.16)" stroke="rgba(234,238,246,.22)" strokeWidth=".5"
                  transform={`rotate(${ang},${sx},${sy+7})`}/>;
              })}
              <text x="28" y={DECK_Y-22} fill="rgba(232,236,246,.32)" fontSize="5.5" fontFamily="monospace">SPRAY FOAM — SEALED ATTIC</text>
            </g>
            :<g>
              <rect x="0" y={DECK_Y-15} width={HOUSE_W} height={17} fill="rgba(255,182,193,.06)"/>
              {Array.from({length:Math.floor(HOUSE_W/17)},(_,i)=>(
                <ellipse key={i} cx={8+i*17} cy={DECK_Y-7} rx={11} ry={8}
                  fill="rgba(255,182,193,.17)" stroke="rgba(255,182,193,.2)" strokeWidth=".45"/>
              ))}
              <text x="28" y={DECK_Y-22} fill="rgba(255,182,193,.35)" fontSize="5.5" fontFamily="monospace">FIBERGLASS INSULATION</text>
            </g>
          )}

          {/* Attic deck — full house width */}
          <rect x="0" y={DECK_Y} width={HOUSE_W} height="5" fill="#141416" stroke="rgba(188,184,168,.09)" strokeWidth="0.4"/>
          {Array.from({length:Math.floor(HOUSE_W/68)},(_,i)=>(
            <rect key={i} x={38+i*68} y={DECK_Y-2} width="10" height="7" rx="1"
              fill="rgba(90,68,32,.2)" stroke="rgba(108,82,36,.12)" strokeWidth="0.4"/>
          ))}
          {/* Interior rafters */}
          {[HOUSE_W*0.1,HOUSE_W*0.22,HOUSE_W*0.36].map((rx,i)=>(
            <line key={'lr'+i} x1={rx} y1={DECK_Y} x2={RIDGE_X} y2={RIDGE_Y}
              stroke="rgba(88,68,32,.09)" strokeWidth="1.5"/>
          ))}
          {[HOUSE_W*0.64,HOUSE_W*0.78,HOUSE_W*0.9].map((rx,i)=>(
            <line key={'rr'+i} x1={rx} y1={DECK_Y} x2={RIDGE_X} y2={RIDGE_Y}
              stroke="rgba(88,68,32,.09)" strokeWidth="1.5"/>
          ))}
          <text x="22" y={DECK_Y+18} fill={W+'.09)'} fontSize="5.5" fontFamily="monospace" letterSpacing="0.8">LIVING SPACE</text>

          {/* Return grille */}
          {hasCoil&&<g>
            <rect x={RET_X+4} y={DECK_Y-1} width={RET_PLEN_W-8} height={9} rx="1"
              fill="none" stroke="rgba(255,182,193,.3)" strokeWidth="0.9" strokeDasharray="3 2.5"/>
            {Array.from({length:7},(_,i)=>(
              <line key={i} x1={RET_X+8+i*((RET_PLEN_W-16)/7)} y1={DECK_Y-1}
                x2={RET_X+8+i*((RET_PLEN_W-16)/7)} y2={DECK_Y+8}
                stroke="rgba(255,182,193,.25)" strokeWidth="0.5"/>
            ))}
            <text x={RET_X+RET_PLEN_W/2} y={DECK_Y+19} textAnchor="middle"
              fill="rgba(255,182,193,.26)" fontSize="5" fontFamily="monospace">RETURN</text>
          </g>}

          {/* Return plenum */}
          {hasCoil&&<g className="snap" key="retplen">
            <rect x={RET_X} y={UNIT_Y} width={RET_PLEN_W} height={UNIT_H} rx="4"
              fill="rgba(255,182,193,.06)" stroke="rgba(255,182,193,.42)" strokeWidth="1.5"/>
            {Array.from({length:20},(_,i)=>{
              const bx=RET_X+4+((i*13)%(RET_PLEN_W-12));
              const by=UNIT_Y+6+i*(UNIT_H-12)/20;
              return <ellipse key={i} cx={bx} cy={by} rx={6+(i%4)*2.5} ry={5+(i%3)*1.5} fill="rgba(255,182,193,.1)"/>;
            })}
            <text x={RET_X+RET_PLEN_W/2} y={UNIT_Y+UNIT_H/2+3} textAnchor="middle"
              fill="rgba(255,182,193,.52)" fontSize="8" fontFamily="monospace"
              transform={`rotate(-90,${RET_X+RET_PLEN_W/2},${UNIT_Y+UNIT_H/2})`}>RETURN PLENUM</text>
            {Array.from({length:8},(_,i)=>(
              <line key={i} x1={RET_X+2} y1={UNIT_Y+12+i*(UNIT_H-24)/8}
                x2={RET_X+2} y2={UNIT_Y+18+i*(UNIT_H-24)/8}
                stroke="rgba(255,182,193,.32)" strokeWidth="2.8" strokeLinecap="round"/>
            ))}
            <path d={`M${RET_X+RET_PLEN_W+2} ${UNIT_Y+UNIT_H/2} L${APR_X+APR_W+2} ${UNIT_Y+UNIT_H/2}`}
              fill="none" stroke={W+'.07)'} strokeWidth="1.1"
              strokeDasharray="5 3" className="airflow" style={{strokeDashoffset:0}} markerEnd="url(#arr)"/>
          </g>}

          {/* Aprilaire */}
          {hasCoil&&hasAprilaire&&<g className="fadein" key="apr">
            <rect x={APR_X} y={UNIT_Y} width={APR_W} height={UNIT_H} rx="2"
              fill="rgba(34,197,94,.09)" stroke="#22c55e" strokeWidth="1.5"/>
            {Array.from({length:16},(_,i)=>(
              <line key={i} x1={APR_X+2} y1={UNIT_Y+8+i*(UNIT_H-16)/16}
                x2={APR_X+APR_W-2} y2={UNIT_Y+8+i*(UNIT_H-16)/16}
                stroke="#22c55e" strokeWidth="0.55" opacity="0.52"/>
            ))}
            <text x={APR_X+APR_W/2} y={UNIT_Y+UNIT_H/2+3} textAnchor="middle"
              fill="#22c55e" fontSize="8" fontFamily="monospace"
              transform={`rotate(-90,${APR_X+APR_W/2},${UNIT_Y+UNIT_H/2})`}>APRILAIRE 5"</text>
          </g>}

          {/* Furnace */}
          {hasCoil&&hasFurnace&&<g className="snap" key={'fu'+a.stage+a.furnace_eff} filter="url(#shadow)">
            <FurnaceH x={FURN_X} y={UNIT_Y} w={FURN_W} h={UNIT_H} active={furnaceActive}/>
            <text x={FURN_X+FURN_W/2} y={UNIT_Y+UNIT_H+12} textAnchor="middle"
              fill={furnaceActive?'rgba(249,115,22,.64)':(G+'.38)')} fontSize="8.5" fontFamily="monospace">FURNACE</text>
            <text x={FURN_X+FURN_W/2} y={UNIT_Y+UNIT_H+22} textAnchor="middle"
              fill={furnaceActive?'rgba(249,115,22,.44)':'rgba(255,255,255,.15)'} fontSize="5.5" fontFamily="monospace">
              {furnaceActive?"HEATING ACTIVE":"STANDBY"}
            </text>
          </g>}

          {/* A-coil (horizontal, right of furnace) */}
          {hasCoil&&hasFurnace&&<g className="snap" key={'ac'+a.cond_tier} style={{animationDelay:'.08s'}} filter="url(#shadow)">
            {(()=>{
              const active=evapActive;
              return <>
                <rect x={ACOIL_X} y={UNIT_Y} width={ACOIL_W} height={UNIT_H} rx="4"
                  fill={active?"#050c1c":"#090909"}
                  stroke={active?(evapC+'88'):(G+'.42)')} strokeWidth={active?1.8:1.5}/>
                {active&&<rect x={ACOIL_X} y={UNIT_Y} width={ACOIL_W} height={UNIT_H} rx="4"
                  fill={refReversed?O+'.03)':'rgba(35,137,224,.03)'} stroke="none"/>}
                <rect x={ACOIL_X} y={UNIT_Y} width={ACOIL_W} height={9} rx="4"
                  fill={active?(refReversed?"url(#orange-g)":"url(#blue)"):"url(#gold)"} opacity=".65"/>
                <ACoilH x={ACOIL_X+8} y={UNIT_Y+12} w={ACOIL_W-16} h={UNIT_H-20} active={active}/>
                <rect x={ACOIL_X} y={UNIT_Y+UNIT_H-2} width={ACOIL_W} height={6} rx="1" fill="#08121e" stroke={B+'.18)'} strokeWidth="0.6"/>
                <text x={ACOIL_X+ACOIL_W/2} y={UNIT_Y+UNIT_H+12} textAnchor="middle"
                  fill={active?evapC:(G+'.36)')} fontSize="8.5" fontFamily="monospace">A-COIL</text>
                <text x={ACOIL_X+ACOIL_W/2} y={UNIT_Y+UNIT_H+22} textAnchor="middle"
                  fill={active?(refReversed?'rgba(239,68,68,.5)':'rgba(35,137,224,.46)'):'rgba(255,255,255,.14)'} fontSize="5.5" fontFamily="monospace">
                  {active?(refReversed?"REJECTING HEAT":"ABSORBING HEAT"):"STANDBY"}
                </text>
              </>;
            })()}
          </g>}

          {/* Air handler */}
          {hasCoil&&!hasFurnace&&<g className="snap" key={'ah'+a.cond_tier} filter="url(#shadow)">
            <AirHandlerH x={AH_X} y={UNIT_Y} w={AH_W} h={UNIT_H} active={evapActive}/>
            <text x={AH_X+AH_W/2} y={UNIT_Y+UNIT_H+12} textAnchor="middle"
              fill={evapActive?evapC:(G+'.36)')} fontSize="8.5" fontFamily="monospace">AIR HANDLER</text>
            <text x={AH_X+AH_W/2} y={UNIT_Y+UNIT_H+22} textAnchor="middle"
              fill={evapActive?(refReversed?'rgba(239,68,68,.5)':'rgba(35,137,224,.46)'):'rgba(255,255,255,.14)'} fontSize="5.5" fontFamily="monospace">
              {evapActive?(refReversed?"REJECTING HEAT":"ABSORBING HEAT"):"STANDBY"}
            </text>
          </g>}

          {/* Supply plenum — right of A-coil/AH, same height */}
          {hasPlenum&&hasCoil&&<g className="snap" key="spl" style={{animationDelay:'.12s'}}>
            {(()=>{
              const isExisting=a.plenum==='none';
              const isMetal=a.plenum==='metal';
              const pFill=isExisting?"rgba(40,40,55,.6)":isMetal?"#1a1c24":"#141108";
              const pStroke=isExisting?(G+'.22)'):(G+(isMetal?'.74)':'.5)'));
              const pSW=isExisting?1:isMetal?1.7:1.4;
              return <>
                <rect x={SUP_X} y={SUP_PLEN_Y} width={SUP_PLEN_W} height={SUP_PLEN_H} rx="3"
                  fill={pFill} stroke={pStroke} strokeWidth={pSW}
                  strokeDasharray={isExisting?"6 3":undefined} opacity={isExisting?0.65:1}/>
                {!isExisting&&(isMetal
                  ?Array.from({length:Math.floor(SUP_PLEN_H/8)},(_,i)=>(
                    <line key={i} x1={SUP_X+2} y1={SUP_PLEN_Y+4+i*8} x2={SUP_X+SUP_PLEN_W-2} y2={SUP_PLEN_Y+4+i*8}
                      stroke={W+'.04)'} strokeWidth="0.3"/>
                  ))
                  :Array.from({length:Math.floor(SUP_PLEN_H/10)},(_,i)=>(
                    <line key={i} x1={SUP_X+3} y1={SUP_PLEN_Y+5+i*10} x2={SUP_X+SUP_PLEN_W-3} y2={SUP_PLEN_Y+5+i*10}
                      stroke={G+'.07)'} strokeWidth="0.6"/>
                  ))
                )}
                <text x={SUP_X+SUP_PLEN_W/2} y={SUP_PLEN_Y+SUP_PLEN_H/2+3} textAnchor="middle"
                  fill={isExisting?(G+'.3)'):(G+'.52)')} fontSize="6.5" fontFamily="monospace">
                  {isExisting?'EXISTING PLENUM':isMetal?'METAL PLENUM':'DUCTBOARD PLENUM'}
                </text>
                {!isExisting&&<text x={SUP_X+SUP_PLEN_W/2} y={SUP_PLEN_Y+SUP_PLEN_H/2+14} textAnchor="middle"
                  fill={G+'.32)'} fontSize="5.5" fontFamily="monospace">4–6 FT SUPPLY</text>}
                {/* Ionizer — perfectly centered between the two supply ducts */}
                {hasIonizer&&!isExisting&&(()=>{
                  // Duct positions from the ductwork section: left duct at pCX-DW*1.8, right at pCX+DW*0.8
                  // Center of gap between them = pCX (the plenum center)
                  const iX=SUP_X+SUP_PLEN_W/2; // exactly centered in plenum
                  return <Ionizer
                    bulbX={iX}
                    bulbY={SUP_PLEN_Y-16}
                    rodLen={Math.round(SUP_PLEN_H*0.55)}/>;
                })()}
              </>;
            })()}
          </g>}

          {/* ── DUCTWORK — clean rectangular runs off supply plenum top ── */}
          {hasPlenum&&hasCoil&&<g className="fadein" key="ducts" style={{animationDelay:'.18s'}}>
            {(()=>{
              const pTop=SUP_PLEN_Y;
              const pCX=SUP_X+SUP_PLEN_W/2;
              const DW=14; // duct width
              const DC=G+'.32)'; // duct color
              const DS=G+'.18)'; // duct shadow
              // Two rectangular duct runs: one left, one right
              // Each: vertical rise from plenum top, then 90° elbow, then horizontal run with boot cap
              const leftRunX=SUP_X-60;
              const rightRunX=SUP_X+SUP_PLEN_W+60;
              const riseH=40; // how far up before turning
              const elbowR=DW;
              return <>
                {/* LEFT duct run */}
                {/* Vertical rise */}
                <rect x={pCX-DW*1.8-DW/2} y={pTop-riseH} width={DW} height={riseH} rx="0"
                  fill={DC} stroke={DS} strokeWidth="1"/>
                {/* Elbow (90° turn) */}
                <rect x={leftRunX} y={pTop-riseH-DW} width={pCX-DW*1.8-leftRunX+DW} height={DW} rx="0"
                  fill={DC} stroke={DS} strokeWidth="1"/>
                {/* Boot cap at end */}
                <rect x={leftRunX-4} y={pTop-riseH-DW-4} width={DW+8} height={DW+8} rx="2"
                  fill="#0a0a0a" stroke={DC} strokeWidth="1.2"/>
                <text x={leftRunX+DW/2} y={pTop-riseH-DW-10} textAnchor="middle"
                  fill={G+'.38)'} fontSize="5" fontFamily="monospace">SUPPLY</text>

                {/* RIGHT duct run */}
                <rect x={pCX+DW*0.8} y={pTop-riseH} width={DW} height={riseH} rx="0"
                  fill={DC} stroke={DS} strokeWidth="1"/>
                <rect x={pCX+DW*0.8} y={pTop-riseH-DW} width={rightRunX-pCX-DW*0.8} height={DW} rx="0"
                  fill={DC} stroke={DS} strokeWidth="1"/>
                <rect x={rightRunX-4} y={pTop-riseH-DW-4} width={DW+8} height={DW+8} rx="2"
                  fill="#0a0a0a" stroke={DC} strokeWidth="1.2"/>
                <text x={rightRunX+DW/2} y={pTop-riseH-DW-10} textAnchor="middle"
                  fill={G+'.38)'} fontSize="5" fontFamily="monospace">SUPPLY</text>
              </>;
            })()}
          </g>}

          {/* ── REFRIGERANT LINES — up to roofline, across to wall ── */}
          {hasCoil&&hasCond&&<g key="rl">
            {(()=>{
              const active=evapActive;
              const lc=active?evapC:'rgba(30,30,50,.5)';
              const lc2=active?evapC2:'rgba(30,30,50,.38)';
              const ry1=UNIT_Y+UNIT_H*0.32, ry2=UNIT_Y+UNIT_H*0.54;
              const wallX=EXT_WALL_X-14;
              return <>
                {/* Foam sleeve */}
                <path d={`M${RL_START_X} ${ry1} L${RL_START_X} ${RL_ROOF_Y} L${wallX} ${RL_ROOF_Y}`}
                  fill="none" stroke="rgba(24,24,44,.6)" strokeWidth="10" strokeLinecap="round" strokeLinejoin="round"/>
                {/* Liquid line */}
                <path d={`M${RL_START_X} ${ry1} L${RL_START_X} ${RL_ROOF_Y} L${wallX} ${RL_ROOF_Y}`}
                  fill="none" stroke={lc} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="draw"/>
                {/* Suction line */}
                <path d={`M${RL_START_X+5} ${ry2} L${RL_START_X+5} ${RL_ROOF_Y+9} L${wallX} ${RL_ROOF_Y+9}`}
                  fill="none" stroke={lc2} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="draw" style={{animationDelay:'.1s'}}/>
                {/* Flow dots */}
                {active&&Array.from({length:3},(_,i)=>(
                  <circle key={i} r="3" fill={i%2===0?evapC:evapC2} opacity="0.74" filter="url(#glow-sm)">
                    <animateMotion dur={(2.2+i*0.4)+'s'} repeatCount="indefinite" begin={i*0.7+'s'}
                      path={refReversed
                        ?`M${wallX} ${RL_ROOF_Y} L${RL_START_X} ${RL_ROOF_Y} L${RL_START_X} ${ry1}`
                        :`M${RL_START_X} ${ry1} L${RL_START_X} ${RL_ROOF_Y} L${wallX} ${RL_ROOF_Y}`}/>
                  </circle>
                ))}
              </>;
            })()}
          </g>}

          {/* ── OUTSIDE ZONE — exterior wall + condenser ── */}
          {hasCond&&<OutsideZone
            wallX={EXT_WALL_X} zoneW={OUTSIDE_W} zoneH={VH}
            condX={COND_X} condY={COND_Y} condW={COND_W} condH={COND_H}
            lineY1={RL_ROOF_Y} lineY2={RL_ROOF_Y+9}
            tierKey={a.cond_tier} active={condenserActive}/>}

          {/* ── THERMOSTAT — visible at bottom of living space ── */}
          {hasTstat&&<g className="snap" key="tstat" style={{animationDelay:'.26s'}}>
            {(()=>{
              const TX=22, TY=DECK_Y+16;
              const isWifi=a.thermostat==='wifi';
              return isWifi
                ?<>
                  <circle cx={TX+44} cy={TY+42} r={40} fill="#0d0d0d" stroke={G+'.65)'} strokeWidth="2"/>
                  <circle cx={TX+44} cy={TY+42} r={32} fill="#060e1c" stroke={B+'.45)'} strokeWidth="1.2"/>
                  <text x={TX+44} y={TY+48} textAnchor="middle" fill={B+'.95)'} fontSize="20"
                    fontFamily="monospace" filter="url(#glow)">{heatMode?'68°':'72°'}</text>
                  <path d={`M${TX+14} ${TY+42} A30 30 0 0 1 ${TX+74} ${TY+42}`}
                    fill="none" stroke={heatMode?"#f97316":"#2389e0"} strokeWidth="3" strokeLinecap="round" opacity="0.55"/>
                  <path d={`M${TX+30} ${TY+68} Q${TX+44} ${TY+58} ${TX+58} ${TY+68}`}
                    fill="none" stroke={B+'.5)'} strokeWidth="2" strokeLinecap="round"/>
                  <path d={`M${TX+35} ${TY+74} Q${TX+44} ${TY+67} ${TX+53} ${TY+74}`}
                    fill="none" stroke={B+'.7)'} strokeWidth="2" strokeLinecap="round"/>
                  <circle cx={TX+44} cy={TY+78} r={3} fill={B+'.8)'}/>
                  <text x={TX+44} y={TY+94} textAnchor="middle" fill={G+'.5)'} fontSize="7" fontFamily="monospace">WI-FI SMART</text>
                </>
                :<>
                  <rect x={TX} y={TY} width={90} height={74} rx="4"
                    fill="#0d0d0d" stroke={G+'.58)'} strokeWidth="1.8"/>
                  <rect x={TX+6} y={TY+7} width={78} height={40} rx="2"
                    fill="#050d18" stroke={B+'.38)'} strokeWidth="1"/>
                  <text x={TX+45} y={TY+33} textAnchor="middle" fill={B+'.92)'} fontSize="22"
                    fontFamily="monospace" filter="url(#glow)">{heatMode?'68°':'72°'}</text>
                  {[10,26,42,58,74].map((bx,i)=>(
                    <rect key={i} x={TX+bx} y={TY+54} width="10" height="6" rx="1.5"
                      fill={G+'.22)'} stroke={G+'.12)'} strokeWidth="0.5"/>
                  ))}
                  <text x={TX+45} y={TY+70} textAnchor="middle" fill={G+'.42)'} fontSize="7" fontFamily="monospace">BASIC PROGRAMMABLE</text>
                </>;
            })()}
          </g>}

          {/* Dehu — hangs from roofline */}
          {/* Dehu + ERV — small boxes side by side, above the furnace/AH */}
          {(hasDehu||Array.isArray(a.extras)&&a.extras.includes('erv'))&&<g>
            {(()=>{
              const sysX=hasFurnace?FURN_X:AH_X;
              const sysW=hasFurnace?FURN_W:AH_W;
              const BW=80, BH=48; // box size — compact
              const GAP=8;
              const both=hasDehu&&Array.isArray(a.extras)&&a.extras.includes('erv');
              const totalW=both?(BW*2+GAP):BW;
              const startX=sysX+Math.round((sysW-totalW)/2);
              const BY=UNIT_Y-BH-14;
              const roofY=EAVE_Y+14;

              const boxes=[];
              if(Array.isArray(a.extras)&&a.extras.includes('erv')) boxes.push('erv');
              if(hasDehu) boxes.push('dehu');

              return boxes.map((type,i)=>{
                const BX=startX+i*(BW+GAP);
                const r1X=BX+BW*0.28, r2X=BX+BW*0.72;
                const isDehu=type==='dehu';
                return <g key={type}>
                  <line x1={r1X} y1={roofY} x2={r1X} y2={BY} stroke={isDehu?"#22c55e":(G+'.45)')} strokeWidth="1" strokeDasharray="4 2" opacity="0.6"/>
                  <line x1={r2X} y1={roofY} x2={r2X} y2={BY} stroke={isDehu?"#22c55e":(G+'.45)')} strokeWidth="1" strokeDasharray="4 2" opacity="0.6"/>
                  <rect x={r1X-3} y={roofY-4} width="7" height="5" rx="1"
                    fill={isDehu?"rgba(34,197,94,.3)":(G+'.2)')} stroke={isDehu?"#22c55e":(G+'.42)')} strokeWidth="0.7"/>
                  <rect x={r2X-3} y={roofY-4} width="7" height="5" rx="1"
                    fill={isDehu?"rgba(34,197,94,.3)":(G+'.2)')} stroke={isDehu?"#22c55e":(G+'.42)')} strokeWidth="0.7"/>
                  <rect x={BX} y={BY} width={BW} height={BH} rx="4"
                    fill={isDehu?"#05120a":"#0a0a06"}
                    stroke={isDehu?"#22c55e":(G+'.55)')} strokeWidth="1.4"/>
                  <rect x={BX} y={BY} width={BW} height={7} rx="4"
                    fill={isDehu?"rgba(34,197,94,.3)":(G+'.25)')} stroke="none"/>
                  {isDehu
                    ?<>
                      <text x={BX+BW/2} y={BY+BH/2-2} textAnchor="middle" fill="#22c55e" fontSize="11">💧</text>
                      <text x={BX+BW/2} y={BY+BH/2+13} textAnchor="middle" fill="#22c55e" fontSize="7.5" fontFamily="monospace">DEHU</text>
                    </>
                    :<>
                      <path d={`M${BX+10} ${BY+BH*0.44} L${BX+BW*0.52} ${BY+BH*0.44}`} fill="none" stroke={B+'.65)'} strokeWidth="1.8" markerEnd="url(#arr)"/>
                      <path d={`M${BX+BW-10} ${BY+BH*0.64} L${BX+BW*0.48} ${BY+BH*0.64}`} fill="none" stroke="rgba(249,115,22,.65)" strokeWidth="1.8" markerEnd="url(#arr)"/>
                      <text x={BX+BW/2} y={BY+BH*0.3} textAnchor="middle" fill={G+'.78)'} fontSize="9" fontFamily="monospace">ERV</text>
                      {/* ERV pipe through roof */}
                      <rect x={BX+BW/2-2} y={roofY-30} width={5} height={roofY-BY} rx="1"
                        fill={G+'.35)'} stroke={G+'.5)'} strokeWidth="0.7"/>
                      <rect x={BX+BW/2-5} y={roofY-32} width={11} height={4} rx="1"
                        fill={G+'.3)'} stroke={G+'.45)'} strokeWidth="0.7"/>
                    </>
                  }
                </g>;
              });
            })()}
          </g>}

          {/* Condensate drain — straight down below attic floor from coil */}
          {hasCoil&&<g key="attic-drain">
            {(()=>{
              const hasPump=Array.isArray(a.extras)&&a.extras.includes('condensate');
              const coilCX=hasFurnace?ACOIL_X+ACOIL_W*0.5:AH_X+AH_W*0.6;
              const drainTopY=UNIT_Y+UNIT_H+4;
              if(hasPump){
                // Pump box sits just below the unit
                const pW=56, pH=20;
                const pX=coilCX-pW/2, pY=drainTopY+4;
                return <>
                  <rect x={pX} y={pY} width={pW} height={pH} rx="3"
                    fill="rgba(35,137,224,.1)" stroke={B+'.5)'} strokeWidth="1.1"/>
                  <text x={coilCX} y={pY+9} textAnchor="middle" fill={B+'.75)'} fontSize="6.5" fontFamily="monospace">COND. PUMP</text>
                  <text x={coilCX} y={pY+17} textAnchor="middle" fill={B+'.5)'} fontSize="5" fontFamily="monospace">condensate</text>
                  {/* Short line from coil to pump */}
                  <line x1={coilCX} y1={drainTopY} x2={coilCX} y2={pY}
                    stroke={B+'.45)'} strokeWidth="2" strokeDasharray="3 2"/>
                </>;
              } else {
                // No pump — drain goes straight down through the deck
                return <>
                  <line x1={coilCX} y1={drainTopY} x2={coilCX} y2={DECK_Y+24}
                    stroke={B+'.4)'} strokeWidth="2" strokeDasharray="4 3" strokeLinecap="round"/>
                  <text x={coilCX+7} y={DECK_Y+16} textAnchor="start"
                    fill={B+'.4)'} fontSize="6" fontFamily="monospace">DRAIN</text>
                </>;
              }
            })()}
          </g>}

          {/* Empty state */}
          {!loc&&<g>
            <text x={HOUSE_W/2} y={VH/2-10} textAnchor="middle" fill={G+'.12)'} fontSize="10" fontFamily="monospace">Choose your location to begin building</text>
            <text x={HOUSE_W/2} y={VH/2+8} textAnchor="middle" fill={G+'.06)'} fontSize="8" fontFamily="monospace">Components assemble here in real time →</text>
          </g>}
        </svg>
      </div>
    );
  }

  // ══════════════════════════════════════════════════════════
  // UPFLOW CLOSET
  // Zoomed out to show full attic above deck. Plenum doubled in height.
  // Ionizer enters horizontally from side of plenum with external bulb.
  // ══════════════════════════════════════════════════════════
  if(isCloset){
    const VW=800, VH=720;       // bigger canvas for iPad
    const SCALE=6.2;             // was 4.8 — wider units
    const UNIT_W=Math.round(20*SCALE);   // 124px
    const FURN_H=Math.round(33*SCALE);   // 205px
    const COIL_H=Math.round(24*SCALE);   // 149px
    const AH_H=Math.round(55*SCALE);     // 341px

    // 2/3 house when condenser, full width otherwise
    const HOUSE_W=hasCond?Math.round(VW*(2/3)):VW-8;
    const OUTSIDE_ZONE_W=hasCond?VW-HOUSE_W:0;
